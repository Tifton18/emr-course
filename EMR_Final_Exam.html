  .dots { display: flex; gap: 4px; flex-wrap: wrap; justify-content: center; max-width: 400px; }
  .dot { height: 10px; border-radius: 5px; cursor: pointer; transition: all 0.2s; background: #93c5fd; }
  .dot.answered { background: #93adc8; }

  /* ── RESULTS ── */
  .results-wrap { min-height: 100vh; padding: 40px 20px; font-family: Georgia, serif; }

  .results-hero { text-align: center; margin-bottom: 40px; }

  .results-name { font-size: 22px; color: #4a6080; margin-bottom: 4px; }
  .results-pct { font-size: 48px; font-weight: 700; color: #1e3a5f; margin-bottom: 4px; }

  .result-row { display: flex; align-items: flex-start; gap: 12px; padding: 10px 0; border-bottom: 1px solid rgba(255,255,255,0.06); }
  .result-row:last-child { border-bottom: none; }
  .result-badge { width: 28px; height: 28px; border-radius: 50%; display: flex; align-items: center; justify-content: center; color: #1e3a5f; font-size: 13px; font-weight: 700; flex-shrink: 0; margin-top: 2px; }
  .result-badge.correct { background: #2e7d32; }
  .result-badge.wrong { background: #c62828; }
  .result-stem { color: #1e3a5f; font-size: 14px; margin-bottom: 4px; }
  .result-correct-ans { font-size: 13px; color: #81c784; }
  .result-pts { font-weight: 700; font-size: 14px; flex-shrink: 0; }
  .submitting-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.7); display: flex; align-items: center; justify-content: center; z-index: 200; flex-direction: column; gap: 16px; }
  .submitting-spinner { width: 48px; height: 48px; border: 4px solid #bfdbfe; border-top-color: #2563eb; border-radius: 50%; animation: spin 0.8s linear infinite; }
  .submitting-text { color: #1e3a5f; font-size: 16px; }
  .submit-status { text-align: center; padding: 16px; border-radius: 12px; margin-bottom: 24px; font-size: 14px; }
  .submit-status.success { background: #dcfce7; border: 1px solid #166534; color: #86efac; }
  .submit-status.error { background: #fee2e2; border: 1px solid #7f1d1d; color: #fca5a5; }

  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }
  @keyframes spin { to { transform: rotate(360deg); } }
</style>

// ── QUESTION DATA ────────────────────────────────────
const questions = [
  {section:"EMS Systems, EMR Role & Medical/Legal",type:"mc",stem:"An EMR is treating a patient when a paramedic unit arrives on scene. The EMR's responsibility at this point is to:",options:["Immediately stop all interventions and step back","Give a concise patient handoff report and transfer care only when the paramedic assumes responsibility","Leave the scene once the paramedic makes eye contact","Continue treating independently and let the paramedic assess separately"],correct:[1],points:1},
  {section:"EMS Systems, EMR Role & Medical/Legal",type:"mc",stem:"A patient with an altered mental status caused by alcohol intoxication is refusing care. Which principle BEST justifies treating this patient?",options:["Expressed consent \u2014 the patient verbally agreed by not physically resisting","Implied consent \u2014 the patient lacks decision-making capacity and would likely consent if competent","The EMR's duty to act supersedes patient rights in all circumstances","Good Samaritan laws protect the EMR regardless of patient consent"],correct:[1],points:1},
  {section:"EMS Systems, EMR Role & Medical/Legal",type:"mc",stem:"Which of the following BEST describes 'scope of practice' for an EMR?",options:["Any skill the EMR feels comfortable performing based on experience","The legally defined set of skills and interventions an EMR is authorized to perform","Skills approved by the medical director on a case-by-case basis","All skills taught in the EMR course regardless of state authorization"],correct:[1],points:1},
  {section:"EMS Systems, EMR Role & Medical/Legal",type:"mc",stem:"To prove negligence against an EMR, which of the following four elements must ALL be established?",options:["Duty, intent, harm, documentation","Duty to act, breach of that duty, causation, and damages","Licensure, certification, documentation, and harm","Scope of practice violation, intent, breach, and apology"],correct:[1],points:1},
  {section:"EMS Systems, EMR Role & Medical/Legal",type:"mc",stem:"An EMR responds off-duty to a car accident and provides care. Which statement BEST applies?",options:["The EMR is required to respond and is covered by their agency's liability insurance","Good Samaritan laws may offer protection if the EMR acts in good faith within their training","The EMR has no legal protection outside their jurisdiction","The EMR must contact medical direction before providing any care"],correct:[1],points:1},
  {section:"EMS Systems, EMR Role & Medical/Legal",type:"mc",stem:"Critical Incident Stress Management (CISM) is primarily designed to:",options:["Provide legal protection after a patient complaint","Help EMS providers process and recover from psychologically traumatic calls","Replace standard debriefing after any ALS response","Serve as a disciplinary process after adverse patient outcomes"],correct:[1],points:1},
  {section:"EMS Systems, EMR Role & Medical/Legal",type:"mc",stem:"A patient hands you a card stating 'Do Not Resuscitate.' The card is signed by the patient and their physician. You should:",options:["Disregard it and begin resuscitation \u2014 only hospital-issued forms are valid","Honor the order; withhold resuscitation but provide comfort measures as appropriate","Begin CPR and contact medical direction for guidance while continuing","Ask a family member to confirm before honoring the order"],correct:[1],points:1},
  {section:"EMS Systems, EMR Role & Medical/Legal",type:"best2",stem:"Which TWO of the following are components that must be present for a patient's refusal of care to be legally valid?",options:["The patient demonstrates decision-making capacity","The patient must be over 21 years of age","The patient has been informed of the risks of refusal","A family member must co-sign the refusal form","The EMR must agree with the patient's decision"],correct:[0,2],points:1},
  {section:"Anatomy, Physiology & Medical Terminology",type:"mc",stem:"A laceration is described as being on the 'medial aspect of the left thigh, proximal to the knee.' This means the wound is:",options:["On the outer left thigh, close to the ankle","On the inner left thigh, closer to the hip than the knee","On the back of the left thigh near the knee","On the outer left thigh near the knee"],correct:[1],points:1},
  {section:"Anatomy, Physiology & Medical Terminology",type:"mc",stem:"Which of the following correctly describes the function of the left ventricle?",options:["Receives oxygenated blood from the lungs and pumps it to the body via the aorta","Receives deoxygenated blood from the body and pumps it to the lungs","Regulates blood flow between the atria and ventricles","Stores oxygenated blood until it is needed by the coronary arteries"],correct:[0],points:1},
  {section:"Anatomy, Physiology & Medical Terminology",type:"mc",stem:"The suffix '-emia' refers to:",options:["Inflammation","A condition of the blood","Surgical removal","Pain"],correct:[1],points:1},
  {section:"Anatomy, Physiology & Medical Terminology",type:"mc",stem:"Tidal volume is BEST defined as:",options:["The maximum amount of air the lungs can hold","The amount of air moved in or out of the lungs with each normal breath","The air that remains in the lungs after maximum exhalation","The difference between maximum inhalation and maximum exhalation capacity"],correct:[1],points:1},
  {section:"Anatomy, Physiology & Medical Terminology",type:"mc",stem:"Which of the following is the correct pathway of blood through the pulmonary circulation?",options:["Right ventricle \u2192 aorta \u2192 lungs \u2192 left atrium","Right ventricle \u2192 pulmonary arteries \u2192 lungs \u2192 pulmonary veins \u2192 left atrium","Left ventricle \u2192 pulmonary veins \u2192 lungs \u2192 right atrium","Left atrium \u2192 pulmonary arteries \u2192 lungs \u2192 right ventricle"],correct:[1],points:1},
  {section:"Anatomy, Physiology & Medical Terminology",type:"mc",stem:"A patient is described as 'diaphoretic.' This means the patient is:",options:["Cyanotic","Pale and mottled","Sweating profusely","Experiencing muscle tremors"],correct:[2],points:1},
  {section:"Anatomy, Physiology & Medical Terminology",type:"matching",stem:"Match each body system with its primary function.",pairs:[{term:"Respiratory system",def:"Exchanges oxygen and carbon dioxide between the body and environment via the lungs"},{term:"Musculoskeletal system",def:"Provides structure, protection for organs, and enables movement via bones and muscles"},{term:"Nervous system",def:"Controls voluntary and involuntary body functions; interprets sensory input and directs responses"},{term:"Endocrine system",def:"Regulates body functions through hormone secretion including blood glucose and stress response"},{term:"Integumentary system",def:"The skin; protects the body from infection, regulates temperature, and provides sensory input"}],points:1},
  {section:"Anatomy, Physiology & Medical Terminology",type:"mc",stem:"Minute volume is calculated by:",options:["Tidal volume divided by respiratory rate","Tidal volume multiplied by respiratory rate","Inspiratory reserve volume plus tidal volume","Total lung capacity minus residual volume"],correct:[1],points:1},
  {section:"Lifting, Moving & Patient Positioning",type:"mc",stem:"Which of the following is the correct position for a patient in shock with no suspected spinal injury?",options:["Fowler's position (45 degrees upright)","Supine with legs elevated approximately 8 to 12 inches","Left lateral recumbent","Prone with head turned to the side"],correct:[1],points:1},
  {section:"Lifting, Moving & Patient Positioning",type:"mc",stem:"You need to move an unresponsive patient who is face down on the floor with no suspected spinal injury. The MOST appropriate move is:",options:["Emergency drag by the ankles","Log roll to supine using spinal precautions regardless of mechanism","Package on a backboard before moving","Use a sheet drag, pulling the patient onto their back"],correct:[3],points:1},
  {section:"Lifting, Moving & Patient Positioning",type:"mc",stem:"Which of the following patients should be transported in the Fowler's position?",options:["A patient in decompensated shock with hypotension","A patient in respiratory distress who is more comfortable sitting upright","A pregnant patient at 34 weeks with syncope","An unresponsive patient with no spinal injury concern"],correct:[1],points:1},
  {section:"Lifting, Moving & Patient Positioning",type:"mc",stem:"When performing a two-person assist for an ambulatory patient, the rescuers should:",options:["Support the patient from behind to catch them if they fall","Position themselves on either side, each supporting one arm over their shoulder with a hand around the patient's waist","Grasp both of the patient's wrists and guide them forward","Have one rescuer lead and one follow with both hands on the patient's back"],correct:[1],points:1},
  {section:"Airway Management",type:"mc",stem:"An adult patient is unresponsive with no gag reflex. The EMR has successfully inserted an OPA. What is the NEXT appropriate airway intervention?",options:["Reassess and monitor \u2014 the OPA alone is sufficient","Begin BVM ventilations if breathing is absent or inadequate","Insert an NPA in addition to the OPA for redundancy","Position the patient prone to maintain the airway passively"],correct:[1],points:1},
  {section:"Airway Management",type:"mc",stem:"The correct rate for delivering ventilations to an adult patient in respiratory arrest using a BVM is:",options:["6 to 8 breaths per minute","10 to 12 breaths per minute","16 to 20 breaths per minute","20 to 24 breaths per minute"],correct:[1],points:1},
  {section:"Airway Management",type:"mc",stem:"During suctioning of an adult patient, the maximum duration of a single suction pass should not exceed:",options:["5 seconds","10 to 15 seconds","30 seconds","60 seconds"],correct:[1],points:1},
  {section:"Airway Management",type:"mc",stem:"Which of the following is the MOST reliable indicator that BVM ventilations are effective?",options:["Improvement in skin color alone","Audible breath sounds without chest rise","Visible bilateral chest rise with each ventilation","An oxygen saturation above 90%"],correct:[2],points:1},
  {section:"Airway Management",type:"mc",stem:"A patient is found with gurgling respirations. The FIRST intervention should be:",options:["Insert an OPA immediately","Suction the airway to clear secretions","Administer high-flow oxygen via NRB","Begin BVM ventilations with an oral airway in place"],correct:[1],points:1},
  {section:"Airway Management",type:"mc",stem:"Gastric distention during BVM ventilation is MOST commonly caused by:",options:["Ventilating too slowly","Excessive tidal volume delivered too rapidly, forcing air into the esophagus","Improper OPA sizing","Using supplemental oxygen at too high a flow rate"],correct:[1],points:1},
  {section:"Airway Management",type:"mc",stem:"An NPA is contraindicated in which of the following situations?",options:["The patient has a gag reflex","The patient is semiconscious","Suspected basilar skull fracture or severe facial trauma","The patient is a child under 12 years old"],correct:[2],points:1},
  {section:"Airway Management",type:"matching",stem:"Match each oxygen delivery device with the approximate FiO2 (oxygen concentration) it delivers.",pairs:[{term:"Nasal cannula at 4 LPM",def:"Approximately 36% oxygen; used for mild hypoxia in patients breathing adequately"},{term:"Simple face mask",def:"Approximately 40 to 60% oxygen; requires minimum 6 LPM to prevent CO2 rebreathing"},{term:"Non-rebreather mask at 15 LPM",def:"Approximately 60 to 100% oxygen; used for severe hypoxia in spontaneously breathing patients"},{term:"BVM with supplemental oxygen",def:"Approximately 90 to 100% oxygen; used for patients requiring assisted or controlled ventilation"},{term:"Blow-by oxygen",def:"Variable low concentration; used for infants and young children who will not tolerate a mask"}],points:1},
  {section:"Ventilation & Breathing Assessment",type:"mc",stem:"A patient with a history of COPD presents with pursed-lip breathing, barrel chest, and an SpO2 of 82%. The MOST appropriate oxygen therapy is:",options:["Withhold oxygen entirely to preserve hypoxic drive","Administer low-flow oxygen via nasal cannula at 1 to 2 LPM only","Administer high-flow oxygen via NRB mask targeting SpO2 of 94 to 98% and monitor respiratory rate closely","Apply a BVM immediately without attempting supplemental oxygen first"],correct:[2],points:1},
  {section:"Ventilation & Breathing Assessment",type:"mc",stem:"An adult patient is breathing at 28 breaths per minute with audible wheezing and accessory muscle use but is conscious and speaking in full sentences. The MOST appropriate intervention is:",options:["Begin BVM ventilations immediately","Apply a nasal cannula, position of comfort, and assist with prescribed bronchodilator if available","Position supine and monitor for respiratory failure","Administer high-flow oxygen and place patient in Trendelenburg"],correct:[1],points:1},
  {section:"Ventilation & Breathing Assessment",type:"mc",stem:"Which of the following findings would prompt an EMR to begin positive pressure ventilation in a breathing patient?",options:["Respiratory rate of 18 with clear lung sounds","SpO2 of 94% on room air with normal respiratory effort","Respiratory rate of 6 with shallow, inadequate tidal volume despite oxygen therapy","Mild accessory muscle use with SpO2 of 92%"],correct:[2],points:1},
  {section:"Ventilation & Breathing Assessment",type:"mc",stem:"Crackles (rales) heard on lung auscultation are MOST consistent with:",options:["Bronchospasm from asthma","Fluid in the alveoli from pulmonary edema or pneumonia","Upper airway obstruction","Pleural friction from inflammation"],correct:[1],points:1},
  {section:"Ventilation & Breathing Assessment",type:"mc",stem:"Which of the following patient presentations is MOST consistent with tension pneumothorax?",options:["Bilateral wheezing, productive cough, low-grade fever","Absent breath sounds on one side, tracheal deviation away from the affected side, hypotension, and distended neck veins","Bilateral crackles, pink frothy sputum, and severe hypertension","Sudden sharp inspiratory chest pain with normal breath sounds bilaterally"],correct:[1],points:1},
  {section:"Ventilation & Breathing Assessment",type:"mc",stem:"Agonal respirations are BEST described as:",options:["Rapid shallow breathing seen in anxiety attacks","Deep labored breathing caused by metabolic acidosis","Slow irregular gasping breaths occurring near death that are not adequate for ventilation","Cyclic periods of increasing then decreasing depth separated by apnea"],correct:[2],points:1},
  {section:"Ventilation & Breathing Assessment",type:"best2",stem:"Which TWO of the following findings indicate a pediatric patient requires immediate ventilatory assistance?",options:["Respiratory rate of 40 with nasal flaring and severe retractions","Respiratory rate of 26 with clear lung sounds and normal skin color","Cyanosis of the lips and fingertips despite supplemental oxygen","SpO2 of 95% on room air with unlabored breathing"],correct:[0,2],points:1},
  {section:"Ventilation & Breathing Assessment",type:"mc",stem:"A patient who was submerged in cold water is now breathing at 8 times per minute with shallow effort and is minimally responsive. The MOST appropriate intervention is:",options:["Apply a NRB mask and monitor","Assist ventilations with a BVM at 10 to 12 breaths per minute","Encourage the patient to breathe deeper on their own","Suction the airway and reassess in two minutes"],correct:[1],points:1},
  {section:"Circulation, Bleeding Control & Shock",type:"mc",stem:"A patient has a large laceration to the femoral area with bright red blood that spurts with each heartbeat. After applying firm direct pressure for 3 minutes, bleeding continues. The MOST appropriate next step is:",options:["Remove the dressing, pack the wound, and apply a pressure bandage","Apply a tourniquet high and tight on the proximal thigh","Elevate the extremity above the heart and apply ice","Call for ALS and withhold further treatment until they arrive"],correct:[1],points:1},
  {section:"Circulation, Bleeding Control & Shock",type:"mc",stem:"The time of tourniquet application must be documented because:",options:["It establishes when the EMR arrived on scene","Prolonged tourniquet time risks limb-threatening ischemia; hospital staff need this information","It is required for billing purposes","Documentation protects the EMR from abandonment claims"],correct:[1],points:1},
  {section:"Circulation, Bleeding Control & Shock",type:"mc",stem:"Which of the following correctly describes the progression from compensated to decompensated hemorrhagic shock?",options:["Blood pressure remains stable throughout both phases","In compensated shock the body maintains BP through vasoconstriction; decompensated shock occurs when these mechanisms fail and BP drops","In decompensated shock the patient is always conscious and able to speak","Compensated shock always requires IV fluid resuscitation before decompensation can be prevented"],correct:[1],points:1},
  {section:"Circulation, Bleeding Control & Shock",type:"mc",stem:"Which type of shock is characterized by warm, flushed skin BELOW the level of a spinal cord injury combined with bradycardia?",options:["Hypovolemic shock","Cardiogenic shock","Neurogenic shock","Anaphylactic shock"],correct:[2],points:1},
  {section:"Circulation, Bleeding Control & Shock",type:"mc",stem:"A wound packing technique is MOST appropriate for which of the following injuries?",options:["A closed femur fracture with significant swelling","A deep junctional wound to the groin or axilla where a tourniquet cannot be applied","A shallow laceration with capillary bleeding","A suspected internal abdominal hemorrhage"],correct:[1],points:1},
  {section:"Circulation, Bleeding Control & Shock",type:"mc",stem:"Which of the following is the MOST important prehospital treatment priority for a patient in severe hemorrhagic shock?",options:["Establish IV access for fluid resuscitation before transport","Control all external bleeding and minimize scene time to enable rapid transport to definitive care","Administer high-flow oxygen via NRB and reassess every 5 minutes on scene","Perform a detailed secondary assessment before moving the patient"],correct:[1],points:1},
  {section:"Circulation, Bleeding Control & Shock",type:"matching",stem:"Match each type of shock with its primary mechanism and key clinical feature.",pairs:[{term:"Hypovolemic shock",def:"Blood or fluid loss; tachycardia, hypotension, pale cool diaphoretic skin"},{term:"Cardiogenic shock",def:"Pump failure; hypotension despite adequate volume, pulmonary edema, weak pulse"},{term:"Distributive shock",def:"Massive vasodilation; warm or flushed skin, hypotension, variable heart rate"},{term:"Obstructive shock",def:"Mechanical blockage of cardiac output; e.g. tension pneumothorax or tamponade"},{term:"Anaphylactic shock",def:"Severe allergen response; urticaria, angioedema, bronchospasm, hypotension"}],points:1},
  {section:"Circulation, Bleeding Control & Shock",type:"best2",stem:"Which TWO interventions are appropriate for a patient in anaphylactic shock with a known allergy who carries an epinephrine auto-injector?",options:["Assist the patient in using their epinephrine auto-injector","Administer oral diphenhydramine as the first-line treatment","Apply high-flow oxygen and prepare for airway deterioration","Position the patient prone to improve venous return","Withhold epinephrine until an ALS provider arrives"],correct:[0,2],points:1},
  {section:"Cardiac Emergencies, CPR & AED",type:"mc",stem:"You arrive to find a 72-year-old male unresponsive on his kitchen floor. He is not breathing and has no pulse. Your FIRST action after confirming the scene is safe is:",options:["Apply the AED and analyze the rhythm","Begin high-quality chest compressions","Open the airway and deliver two rescue breaths","Call for ALS backup before touching the patient"],correct:[1],points:1},
  {section:"Cardiac Emergencies, CPR & AED",type:"mc",stem:"To minimize interruptions during CPR, chest compressions should be paused for no more than:",options:["5 seconds","10 seconds","20 seconds","30 seconds"],correct:[1],points:1},
  {section:"Cardiac Emergencies, CPR & AED",type:"mc",stem:"Which of the following statements about AED pad placement is CORRECT?",options:["One pad on the left chest, one pad on the upper right abdomen","One pad below the right clavicle, one pad on the left lateral chest below the axilla","Both pads placed over the sternum for maximum current delivery","Pads must be placed only by ALS providers"],correct:[1],points:1},
  {section:"Cardiac Emergencies, CPR & AED",type:"mc",stem:"A patient has a pacemaker implanted beneath the skin of the upper left chest. When applying AED pads, you should:",options:["Place the left pad directly over the pacemaker for best contact","Place the AED pad at least 1 inch away from the implanted device","Withhold the AED and use manual CPR only","Remove the pacemaker before using the AED"],correct:[1],points:1},
  {section:"Cardiac Emergencies, CPR & AED",type:"mc",stem:"A 52-year-old female calls 911 reporting indigestion, nausea, jaw pain, and unusual fatigue that started an hour ago. She denies chest pain. The MOST appropriate interpretation of these findings is:",options:["Likely gastrointestinal illness; transport non-emergent","These are atypical AMI symptoms common in women; treat as cardiac emergency","Anxiety-related somatic complaints; reassure the patient","Musculoskeletal jaw strain; no cardiac concern"],correct:[1],points:1},
  {section:"Cardiac Emergencies, CPR & AED",type:"mc",stem:"For two-rescuer infant CPR, the preferred compression technique is:",options:["Two fingers on the center of the chest","Heel of one hand only","Two thumbs encircling the chest with both hands around the infant's thorax","The same technique used for adults scaled to size"],correct:[2],points:1},
  {section:"Cardiac Emergencies, CPR & AED",type:"mc",stem:"Which of the following is TRUE regarding the use of an AED on a child between 1 and 8 years old?",options:["AEDs should never be used on children under 8","Pediatric pads or a dose attenuator should be used if available; if not, adult pads may be used","Adult AED settings are always safe for all pediatric patients","AEDs cannot analyze pediatric rhythms accurately"],correct:[1],points:1},
  {section:"Cardiac Emergencies, CPR & AED",type:"best2",stem:"Which TWO of the following are signs of obvious death that justify withholding resuscitation efforts?",options:["Rigor mortis with dependent lividity","Cyanosis of the lips and fingertips","Decapitation or obvious mortal injury incompatible with survival","Unresponsiveness without a palpable pulse","An SpO2 of 0% on the pulse oximeter"],correct:[0,2],points:1},
  {section:"Medical Emergencies I",type:"mc",stem:"You respond to a 44-year-old female who is confused and diaphoretic. Her husband states she is a type 1 diabetic and took her insulin but skipped breakfast. Her blood glucose reads 38 mg/dL. She is conscious but confused. The MOST appropriate intervention is:",options:["Administer high-flow oxygen and transport without glucose","Administer oral glucose gel and reassess mental status","Place her supine and monitor for seizure activity","Withhold glucose until ALS arrives to administer IV dextrose"],correct:[1],points:1},
  {section:"Medical Emergencies I",type:"mc",stem:"The AEIOU-TIPS mnemonic is used to identify causes of altered mental status. Which of the following correctly identifies what the letter 'I' represents?",options:["Infection only","Insulin (both hypoglycemia and hyperglycemia)","Intoxication from alcohol only","Increased intracranial pressure only"],correct:[1],points:1},
  {section:"Medical Emergencies I",type:"mc",stem:"A patient presents with sudden onset of a severe 'thunderclap' headache described as the worst of their life, along with neck stiffness and photophobia. Which condition should the EMR MOST suspect?",options:["Tension headache","Migraine with aura","Subarachnoid hemorrhage","Hypertensive urgency"],correct:[2],points:1},
  {section:"Medical Emergencies I",type:"mc",stem:"During an active generalized tonic-clonic seizure, the MOST important role of the EMR is:",options:["Restrain the patient to prevent injury during convulsions","Insert an OPA immediately to protect the airway","Protect the patient from injury, time the seizure, and prepare to manage the airway in the postictal phase","Administer oral glucose in case hypoglycemia is the cause"],correct:[2],points:1},
  {section:"Medical Emergencies I",type:"mc",stem:"The Cincinnati Stroke Scale assesses which THREE findings?",options:["Blood pressure, pulse, and temperature","Facial droop, arm drift, and speech abnormality","Pupil response, grip strength, and gait","Level of consciousness, vision, and coordination"],correct:[1],points:1},
  {section:"Medical Emergencies I",type:"mc",stem:"A diabetic patient becomes unresponsive after you administered oral glucose. The MOST appropriate next action is:",options:["Administer a second dose of oral glucose","Protect the airway, support ventilations as needed, and request ALS","Position prone and wait for natural recovery","Apply a NRB mask and transport without further intervention"],correct:[1],points:1},
  {section:"Medical Emergencies I",type:"mc",stem:"Which of the following BEST distinguishes a TIA (transient ischemic attack) from a completed ischemic stroke?",options:["A TIA involves hemorrhage; a stroke does not","TIA symptoms resolve completely within 24 hours; stroke symptoms persist","A TIA only affects vision; a stroke affects motor function","TIAs require CPR; strokes do not"],correct:[1],points:1},
  {section:"Medical Emergencies I",type:"best2",stem:"Which TWO of the following are features of hyperglycemic emergencies (diabetic ketoacidosis) that distinguish them from hypoglycemia?",options:["Gradual onset over hours to days","Sudden onset within minutes","Fruity or acetone breath odor","Diaphoresis and pallor","Trembling and agitation from sympathetic activation"],correct:[0,2],points:1},
  {section:"Medical Emergencies II",type:"mc",stem:"A patient with a history of asthma is in severe respiratory distress, wheezing audibly, and has an SpO2 of 87%. She has already used her rescue inhaler twice with no improvement. The MOST appropriate action is:",options:["Advise her to use the inhaler a third time and monitor","Administer high-flow oxygen, assist ventilations if she deteriorates, and transport urgently","Apply a nasal cannula at 2 LPM and reassess in 10 minutes","Position supine to reduce respiratory effort"],correct:[1],points:1},
  {section:"Medical Emergencies II",type:"mc",stem:"Which of the following presentations is MOST consistent with acute pulmonary edema?",options:["Sudden onset unilateral chest pain, absent breath sounds on one side","Bilateral crackles, pink frothy sputum, severe dyspnea, hypertension, and Fowler's position preference","Diffuse expiratory wheezing with prolonged expiratory phase","Pleuritic chest pain relieved by leaning forward"],correct:[1],points:1},
  {section:"Medical Emergencies II",type:"mc",stem:"A patient was stung by multiple bees 10 minutes ago and now has generalized urticaria, stridor, and a blood pressure of 70/40 mmHg. The treatment priority for this patient is:",options:["Diphenhydramine by mouth, high-flow oxygen, and transport","Epinephrine administration, high-flow oxygen, and immediate transport with ALS intercept if possible","Apply a constricting band above the sting site and ice packs","Position supine, apply oxygen, and monitor blood pressure every 5 minutes"],correct:[1],points:1},
  {section:"Medical Emergencies II",type:"mc",stem:"Which of the following ingested substances is MOST likely to produce the SLUDGE toxidrome (salivation, lacrimation, urination, defecation, GI distress, emesis)?",options:["Opioid analgesics","Organophosphate pesticides or nerve agents","Tricyclic antidepressants","Cocaine or methamphetamine"],correct:[1],points:1},
  {section:"Medical Emergencies II",type:"mc",stem:"When approaching a patient with a behavioral emergency who is agitated and yelling, the MOST important safety principle is:",options:["Approach quickly and confidently to establish control","Stand directly in front of the patient to make eye contact and demonstrate authority","Maintain a safe distance, keep an exit available, and use calm verbal de-escalation","Physically restrain the patient before assessment to protect everyone on scene"],correct:[2],points:1},
  {section:"Medical Emergencies II",type:"mc",stem:"A patient took an unknown quantity of opioid pain pills. He is unresponsive with a respiratory rate of 4 per minute and pinpoint pupils. After opening the airway, the MOST important intervention is:",options:["Apply a NRB mask and transport","Begin BVM ventilation at 10 to 12 breaths per minute","Perform sternal rub to stimulate breathing","Administer oral activated charcoal"],correct:[1],points:1},
  {section:"Medical Emergencies II",type:"mc",stem:"Abdominal pain that is diffuse, accompanied by guarding and rigidity, is MOST concerning for:",options:["Appendicitis with localized inflammation","Peritonitis or a serious intra-abdominal emergency requiring urgent surgical evaluation","Musculoskeletal strain from recent physical activity","Constipation with gas pain"],correct:[1],points:1},
  {section:"Medical Emergencies II",type:"matching",stem:"Match each medical emergency with its priority prehospital intervention.",pairs:[{term:"Anaphylaxis with hypotension",def:"Epinephrine auto-injector, high-flow oxygen, supine position, rapid transport"},{term:"Opioid overdose with apnea",def:"BVM ventilation; request ALS for naloxone administration"},{term:"Acute severe asthma",def:"High-flow oxygen, assist with prescribed bronchodilator, position of comfort, urgent transport"},{term:"Acute behavioral emergency",def:"Scene safety, calm de-escalation, do not restrain without police, protect patient and crew"},{term:"Suspected stroke",def:"Cincinnati Stroke Scale, note time of onset, high-flow oxygen, rapid transport to stroke center"}],points:1},
  {section:"Trauma Assessment, Soft Tissue & Burns",type:"mc",stem:"A patient fell from a 20-foot ladder and struck the ground feet-first. Based on kinematics and the mechanism of injury, which injury pattern should the EMR be MOST prepared to find?",options:["Isolated bilateral ankle fractures","Bilateral calcaneus fractures, lumbar compression fractures, and possible wrist fractures from outstretched hands","Head injury only due to the height of the fall","Isolated hip fractures from ground impact"],correct:[1],points:1},
  {section:"Trauma Assessment, Soft Tissue & Burns",type:"mc",stem:"An adult patient has partial-thickness burns to the entire anterior left leg and the perineum. Using the Rule of Nines, the approximate total BSA burned is:",options:["10%","10.5% (9% leg + 1% perineum)","14%","18%"],correct:[1],points:1},
  {section:"Trauma Assessment, Soft Tissue & Burns",type:"mc",stem:"Which of the following burn wounds requires the MOST urgent transport to a burn center?",options:["Superficial burns to the forearm in an adult with no other injuries","Partial-thickness burns covering 25% BSA in a 6-year-old child","Minor burns to the upper back in a healthy 30-year-old","A small full-thickness burn less than 1% BSA on the thigh"],correct:[1],points:1},
  {section:"Trauma Assessment, Soft Tissue & Burns",type:"mc",stem:"Management of a patient with an impaled object in the eye should include:",options:["Removing the object quickly to prevent pressure buildup","Stabilizing the object with bulky dressings, covering both eyes, and transporting","Applying direct pressure over the object to control bleeding","Flushing the eye with saline and removing the object carefully"],correct:[1],points:1},
  {section:"Trauma Assessment, Soft Tissue & Burns",type:"mc",stem:"An abrasion is BEST described as:",options:["A deep wound that penetrates all layers of the skin and underlying tissue","A wound caused by a scraping or rubbing force that removes the superficial skin layers","A wound with smooth, clean edges typically caused by a sharp object","A crush injury that damages underlying structures without breaking the skin"],correct:[1],points:1},
  {section:"Trauma Assessment, Soft Tissue & Burns",type:"mc",stem:"Which of the following is the correct approach to a chemical burn?",options:["Neutralize the chemical with the opposing acid or base before irrigating","Brush off dry chemicals if present, then flush with large amounts of water for at least 20 minutes","Apply a moist dressing without flushing to prevent spreading the chemical","Cover with a dry sterile dressing and transport without flushing"],correct:[1],points:1},
  {section:"Trauma Assessment, Soft Tissue & Burns",type:"best2",stem:"Which TWO of the following are correct principles when managing a patient with a traumatic amputation?",options:["Control bleeding with direct pressure and tourniquet if needed for an extremity","Attempt to surgically reattach the part at the scene using available supplies","Wrap the amputated part in a moist sterile dressing, place in a plastic bag, and keep cool without direct contact with ice","Discard the amputated part if it appears severely damaged","Transport the amputated part separately on a different unit"],correct:[0,2],points:1},
  {section:"Trauma Assessment, Soft Tissue & Burns",type:"mc",stem:"During a primary trauma assessment, the 'C' in the CABC approach refers to:",options:["Cervical spine clearance before airway management","Catastrophic hemorrhage control as the first priority before airway","Circulation assessment after airway and breathing","Chest auscultation for pneumothorax"],correct:[1],points:1},
  {section:"Musculoskeletal, Spinal, Head & Chest Trauma",type:"mc",stem:"When assessing CSM (circulation, sensation, movement) after splinting a fracture, which finding indicates a vascular emergency requiring immediate intervention?",options:["Capillary refill of 2 seconds","Mild pain at the fracture site with palpation","Absent distal pulse with numbness and inability to move fingers or toes","Moderate swelling at the fracture site"],correct:[2],points:1},
  {section:"Musculoskeletal, Spinal, Head & Chest Trauma",type:"mc",stem:"A patient has an open femur fracture with a bone end visible through the wound. The MOST appropriate management is:",options:["Attempt to push the bone end back below the skin before splinting","Control bleeding with direct pressure, do not push bone back, apply traction splint if appropriate, and transport","Thoroughly irrigate the wound with water before dressing and splinting","Disregard wound management and focus only on splinting the fracture"],correct:[1],points:1},
  {section:"Musculoskeletal, Spinal, Head & Chest Trauma",type:"mc",stem:"Cushing's triad, which indicates rising intracranial pressure, consists of:",options:["Tachycardia, hypotension, and tachypnea","Hypertension with widening pulse pressure, bradycardia, and irregular respirations","Hypotension, bradycardia, and dilated pupils","Fever, seizures, and nuchal rigidity"],correct:[1],points:1},
  {section:"Musculoskeletal, Spinal, Head & Chest Trauma",type:"mc",stem:"Which of the following mechanisms should prompt spinal precautions even in a patient who is ambulatory and denies neck pain?",options:["A low-speed rear-end collision with no airbag deployment","A fall from standing height in an elderly patient with osteoporosis","A minor sports collision with localized shoulder pain only","Tripping over a curb with a fall onto the outstretched hands"],correct:[1],points:1},
  {section:"Musculoskeletal, Spinal, Head & Chest Trauma",type:"mc",stem:"A flail chest segment is identified by:",options:["A single rib fracture with localized point tenderness","Paradoxical chest wall movement where a segment moves opposite to the rest of the chest during breathing","Crepitus on auscultation with a pleural friction rub","Absent breath sounds on one side with deviated trachea"],correct:[1],points:1},
  {section:"Musculoskeletal, Spinal, Head & Chest Trauma",type:"mc",stem:"Immediate spinal stabilization is indicated for which of the following patients?",options:["A patient who walked away from a minor fender bender and has mild shoulder stiffness","An unresponsive patient found at the base of a staircase with an unknown mechanism","A restrained driver with airbag deployment who is ambulatory with no complaints","A patient who slipped on a wet floor and has only right wrist pain"],correct:[1],points:1},
  {section:"Musculoskeletal, Spinal, Head & Chest Trauma",type:"matching",stem:"Match each thoracic injury with its key assessment finding.",pairs:[{term:"Simple pneumothorax",def:"Absent or decreased breath sounds on the affected side without hemodynamic compromise"},{term:"Tension pneumothorax",def:"Absent breath sounds on one side plus tracheal deviation, JVD, and hypotension"},{term:"Hemothorax",def:"Dullness to percussion on the affected side; blood accumulation in the pleural space"},{term:"Flail chest",def:"Paradoxical chest wall movement; multiple consecutive rib fractures causing a free-floating segment"},{term:"Cardiac tamponade",def:"Beck's triad: hypotension, distended neck veins, muffled heart sounds"}],points:1},
  {section:"Musculoskeletal, Spinal, Head & Chest Trauma",type:"best2",stem:"Which TWO of the following are correct principles for splinting a fracture in the prehospital setting?",options:["Splint the injury in the position found; do not straighten angulated fractures unless CSM is compromised","Always straighten all angulated fractures to the anatomical position before splinting","Reassess CSM before and after applying the splint","Apply the tightest possible wrap to prevent movement","Splint only after IV access is established"],correct:[0,2],points:1},
  {section:"Obstetrics, Pediatrics & Geriatrics",type:"mc",stem:"You arrive to find a patient who is 38 weeks pregnant in active labor. You can see the baby's head crowning. The MOST appropriate action is:",options:["Transport immediately \u2014 do not attempt field delivery","Prepare for an imminent delivery, support the head, and guide the delivery","Place the mother in the left lateral recumbent position and delay delivery","Apply oxygen only and wait for ALS"],correct:[1],points:1},
  {section:"Obstetrics, Pediatrics & Geriatrics",type:"mc",stem:"After a field delivery, the newborn is limp, not breathing, and centrally cyanotic. The FIRST intervention is:",options:["Begin CPR immediately at 30:2","Dry and stimulate the newborn vigorously, position the airway, and reassess","Administer blow-by oxygen and wait 60 seconds before intervening","Clamp and cut the umbilical cord before assessment"],correct:[1],points:1},
  {section:"Obstetrics, Pediatrics & Geriatrics",type:"mc",stem:"Which of the following is the MOST common cause of cardiac arrest in pediatric patients?",options:["Ventricular fibrillation from a primary cardiac event","Respiratory failure leading to hypoxic cardiac arrest","Sudden coronary artery occlusion","Arrhythmia from congenital heart disease"],correct:[1],points:1},
  {section:"Obstetrics, Pediatrics & Geriatrics",type:"mc",stem:"When assessing an elderly patient after a ground-level fall, which of the following considerations is MOST important?",options:["Ground-level falls in the elderly are low-energy and rarely cause serious injury","Osteoporosis, anticoagulant medications, and reduced physiological reserve increase the risk of serious injury even from minor mechanisms","Elderly patients should only be treated for visible external injuries","Vital signs in elderly patients are always reliable indicators of injury severity"],correct:[1],points:1},
  {section:"Obstetrics, Pediatrics & Geriatrics",type:"mc",stem:"A pregnant patient at 32 weeks gestation collapses with a sudden seizure and has no prior history of epilepsy. The MOST likely cause is:",options:["Hypoglycemia from gestational diabetes","Eclampsia \u2014 seizures related to severe hypertension of pregnancy","A primary seizure disorder triggered by the stress of pregnancy","Syncope misidentified as a seizure"],correct:[1],points:1},
  {section:"Obstetrics, Pediatrics & Geriatrics",type:"mc",stem:"Which of the following pediatric anatomical differences MOST increases the risk of airway obstruction compared to adults?",options:["Smaller lung capacity requiring slower ventilation rates","The proportionally larger head causing neck flexion when supine, along with a higher, more anterior larynx","Lower respiratory drive requiring supplemental oxygen at lower flow rates","Greater chest wall compliance making compressions easier but ventilations harder"],correct:[1],points:1},
  {section:"Obstetrics, Pediatrics & Geriatrics",type:"best2",stem:"Which TWO of the following are normal physiological changes in geriatric patients that can mask serious illness or injury?",options:["A blunted heart rate response to pain and blood loss making tachycardia unreliable as a shock indicator","Increased pain sensitivity making even minor injuries feel severe","Reduced ability to mount a fever in response to serious infection","Increased blood volume improving tolerance to hemorrhage"],correct:[0,2],points:1},
  {section:"Obstetrics, Pediatrics & Geriatrics",type:"mc",stem:"After delivery, if the umbilical cord is wrapped around the baby's neck (nuchal cord), the EMR should:",options:["Cut the cord immediately before delivering the shoulders","Attempt to slip the cord over the baby's head or create a loop for the baby to somersault through","Leave the cord in place and transport without attempting to move it","Clamp the cord in two places and cut before delivering the body"],correct:[1],points:1},
  {section:"Environmental Emergencies & Special Situations",type:"mc",stem:"A patient was working outdoors in 95-degree heat and now presents with hot, dry skin, altered mental status, a temperature of 104.5\u00b0F, and a rapid pulse. The MOST likely diagnosis and priority treatment is:",options:["Heat exhaustion; move to a cool environment and administer oral fluids","Heat stroke; aggressive cooling by any available means while transporting immediately","Heat cramps; stretching, hydration, and rest","Hyperthermia from infection; treat with antipyretics"],correct:[1],points:1},
  {section:"Environmental Emergencies & Special Situations",type:"mc",stem:"Which of the following correctly differentiates heat exhaustion from heat stroke?",options:["Heat exhaustion has a normal mental status while heat stroke presents with altered mental status and hot dry skin","They are the same condition at different severity levels with identical treatment","Heat exhaustion is always more dangerous than heat cramps","Heat stroke is characterized by profuse sweating and normal mentation"],correct:[0],points:1},
  {section:"Environmental Emergencies & Special Situations",type:"mc",stem:"A hiker is rescued after 18 hours in a cold, wet environment. He is shivering violently, confused, and has a heart rate of 52. The MOST appropriate management is:",options:["Encourage vigorous exercise to generate body heat","Handle gently, remove wet clothing, insulate from further heat loss, and transport for active rewarming","Submerge in warm water at the scene","Administer high-flow oxygen via NRB and transport in any position"],correct:[1],points:1},
  {section:"Environmental Emergencies & Special Situations",type:"mc",stem:"A patient was submerged in cold water for approximately 4 minutes and is now pulseless and apneic. The MOST appropriate action is:",options:["Do not resuscitate \u2014 submersion for more than 3 minutes is nonsurvivable","Begin CPR and AED; cold water submersion patients have had meaningful neurological recovery after extended downtime","Check for signs of obvious death only before pronouncing in the field","Administer two rescue breaths only and reassess for 60 seconds"],correct:[1],points:1},
  {section:"Environmental Emergencies & Special Situations",type:"mc",stem:"Which of the following is the correct field management of a suspected frostbite injury to the feet?",options:["Rub the affected area briskly to restore circulation","Do not rewarm in the field if refreezing is possible; protect from trauma and transport","Immerse the feet in hot water immediately to restore tissue perfusion","Pop blisters and apply antibiotic ointment before dressing"],correct:[1],points:1},
  {section:"Environmental Emergencies & Special Situations",type:"mc",stem:"A patient was bitten on the lower leg by what witnesses describe as a rattlesnake. The MOST appropriate prehospital management is:",options:["Apply a tourniquet proximal to the bite site immediately","Keep the patient calm and still, immobilize the extremity at or below heart level, and transport","Incise and suction the bite wound to remove venom","Apply ice packs to the bite site and monitor for anaphylaxis only"],correct:[1],points:1},
  {section:"Environmental Emergencies & Special Situations",type:"mc",stem:"When caring for a patient who has been struck by lightning, which of the following is TRUE?",options:["It is unsafe to touch a lightning strike victim as they may carry residual charge","Lightning strike victims are safe to touch; begin assessment and CPR if indicated","Lightning strikes are always fatal; initiate transport only","Lightning patients should never receive CPR due to risk of secondary cardiac events"],correct:[1],points:1},

// ── STATE ────────────────────────────────────────────
let phase        = "intro";
let studentName  = "";
let current      = 0;
let answers      = Array(questions.length).fill(null);
let matchSels    = {};      // "qIdx-termIdx" -> def string
let shuffledDefs = {};      // qIdx -> shuffled def array
let timeLeft     = TOTAL_TIME;
let timerInterval= null;
let dragData     = null;    // {def, fromTermIdx}
let startTime    = null;

// ── SHUFFLE ──────────────────────────────────────────
function shuffle(arr) { return [...arr].sort(() => Math.random()-0.5); }
function initShuffles() {
  questions.forEach((q,i) => {
    if (q.type === "matching") shuffledDefs[i] = shuffle(q.pairs.map(p=>p.def));
  });
}

// ── SCORING ──────────────────────────────────────────
function scoreQuestion(q, ans) {
  if (!ans) return false;
  if (q.type === "mc")      return ans[0] === q.correct[0];
  if (q.type === "best2")   return ans.length===2 && ans.every(a=>q.correct.includes(a));
  if (q.type === "matching") return q.pairs.every((p,ti)=>ans[ti]===p.def);
  return false;
}
function calcScore() {
  let score=0, total=0;
  questions.forEach((q,i)=>{ total+=q.points; if(scoreQuestion(q,answers[i])) score+=q.points; });
  return {score,total};
}

// ── SAVE MATCHING ANS ────────────────────────────────
function saveMatchingAnswers(qIdx) {
  const q = questions[qIdx];
  answers[qIdx] = q.pairs.map((_,ti)=>matchSels[`${qIdx}-${ti}`]||null);
}

// ── TIMER ────────────────────────────────────────────
function startTimer() {
  startTime = Date.now();
  timerInterval = setInterval(()=>{
    timeLeft--;
    updateTimerUI();
    if (timeLeft <= 0) { clearInterval(timerInterval); finishExam(); }
  }, 1000);
}
function updateTimerUI() {
  const m = Math.floor(timeLeft/60), s = timeLeft%60;
  const str = `${m}:${String(s).padStart(2,"0")}`;
  const color = timeLeft<60?"#ef4444":timeLeft<180?"#f59e0b":"#22c55e";
  document.querySelectorAll(".timer-text").forEach(el=>{ el.textContent=str; el.style.color=color; });
  document.querySelectorAll(".timer-dot").forEach(el=>{ el.style.background=color; el.classList.toggle("pulse",timeLeft<60); });
  document.querySelectorAll(".timer-bar-fill").forEach(el=>{ el.style.width=`${(timeLeft/TOTAL_TIME)*100}%`; el.style.background=color; });
}

// ── SUBMIT TO GOOGLE SHEETS ──────────────────────────
// Uses GET with ?payload= because Apps Script cross-origin POST is blocked
// by CORS preflight. GET requests follow the redirect and reach doGet().
async function submitToSheets(subData) {
  if (!APPS_SCRIPT_URL || APPS_SCRIPT_URL === "YOUR_APPS_SCRIPT_URL_HERE") {
    console.warn("No Apps Script URL configured — skipping submission.");
    return { success: false, noUrl: true };
  }
  try {
    const payload = encodeURIComponent(JSON.stringify(subData));
    const url = APPS_SCRIPT_URL + "?payload=" + payload;
    const resp = await fetch(url, { method: "GET", mode: "no-cors" });
    // no-cors GET to Apps Script follows redirect; we can't read response body
    // but the data arrives. Treat as success.
    return { success: true };
  } catch(e) {
    return { success: false, error: e.toString() };
  }
}

// ── FINISH EXAM ──────────────────────────────────────
async function finishExam() {
  clearInterval(timerInterval);
  const {score,total} = calcScore();
  const pct = Math.round((score/total)*100);
  const timeUsed = TOTAL_TIME - timeLeft;
  const questionResults = questions.map((q,i)=>scoreQuestion(q,answers[i]));

  const subData = {
    examLabel: EXAM_LABEL,
    name: studentName,
    score, total, pct, timeUsed,
    questionResults,
    submittedAt: new Date().toISOString(),
  };

  phase = "submitting";
  render();

  const result = await submitToFirebase(subData);
  phase = "results";
  window._submitResult = result;
  window._examScore = {score,total,pct};
  window._questionResults = questionResults;
  render();
}

// ── RENDER ───────────────────────────────────────────
function render() {
  const root = document.getElementById("root");
  if (phase === "intro")       root.innerHTML = renderIntro();
  else if (phase === "submitting") root.innerHTML = renderSubmitting();
  else if (phase === "results") root.innerHTML = renderResults();
  else                          root.innerHTML = renderExam();
  attachEvents();
}

function renderExam() {
  const q = questions[current];
  const sc = SECTION_COLORS[q.section] || {bg:"#1a1a2e",accent:"#2196F3"};
  const progress = ((current+1)/questions.length)*100;
  const ans = answers[current] || [];

  let questionBody = "";
  if (q.type==="mc" || q.type==="best2") {
    const hint = q.type==="best2"
      ? `<div class="best2-hint">★ Select the TWO best answers ${ans.length>0?"("+ans.length+"/2 selected)":""}</div>` : "";
    const opts = q.options.map((opt,idx)=>{
      const sel = ans.includes(idx);
      return `<button class="option-btn ${q.type==="best2"?"best2":""} ${sel?"selected":""}" data-idx="${idx}">
        <div class="option-indicator">${LETTERS[idx]}</div>
        <div class="option-text">${opt}</div>
      </button>`;
    }).join("");
    questionBody = `<div class="options-list">${hint}${opts}</div>`;

  } else if (q.type==="matching") {
    const defs = shuffledDefs[current] || q.pairs.map(p=>p.def);
    const usedDefs = new Set(Object.entries(matchSels).filter(([k])=>k.startsWith(current+"-")).map(([,v])=>v));
    const bankDefs = defs.filter(d=>!usedDefs.has(d));

    const bankChips = bankDefs.map(def=>`<div class="def-chip" draggable="true" data-def="${encodeURIComponent(def)}">${def}</div>`).join("") ||
      `<div class="def-bank-empty">All definitions assigned</div>`;

    const termRows = q.pairs.map((pair,ti)=>{
      const assigned = matchSels[`${current}-${ti}`];
      return `
        <div class="term-row ${assigned?"assigned":""}" data-term-idx="${ti}">
          <div class="term-name"><span>${pair.term}</span></div>
          <div class="term-drop">
            ${assigned
              ? `<div class="def-chip" draggable="true" data-def="${encodeURIComponent(assigned)}" data-from-term="${ti}" style="margin:0;width:100%">${assigned}</div>`
              : `<span class="term-placeholder">— drag a definition here —</span>`}
          </div>
        </div>`;
    }).join("");

    questionBody = `
      <div class="match-instructions"><strong>Drag</strong> a definition from the bank and <strong>drop</strong> it onto the matching term. Drag a placed definition back to the bank to unassign it.</div>

      <div class="def-bank" id="defBank">${bankChips}</div>

    ? `<span class="q-badge" style="background:#7c3aed22;color:#a78bfa;border:1px solid #7c3aed44">SELECT 2</span>` : "";

  const dots = questions.map((_,i)=>
    `<div class="dot ${i===current?"current":answers[i]?"answered":""}" style="width:${i===current?20:10}px" data-dot="${i}"></div>`
  ).join("");

  const navRight = current < questions.length-1
    ? `<button class="btn-next" id="nextBtn">Next →</button>`
    : `<button class="btn-submit-exam" id="submitExamBtn">Submit Exam</button>`;

  return `
    <div>
      <div class="topbar">
        <div class="topbar-inner">
          <div class="progress-wrap">
            <div class="progress-bar"><div class="progress-fill" style="width:${progress}%;background:${sc.accent}"></div></div>
            <span class="progress-text">${current+1} / ${questions.length}</span>

          <div class="timer-box" style="border-color:#1e2a3a">

      </div>

        <div class="section-badge" style="background:${sc.bg}">

// ── EVENT BINDING ────────────────────────────────────
function attachEvents() {
  // INTRO
  const nameInput = document.getElementById("nameInput");
  const beginBtn  = document.getElementById("beginBtn");
  if (nameInput) {
    nameInput.value = studentName;
    const passwordInput = document.getElementById("passwordInput");
    const passwordError = document.getElementById("passwordError");
    function updateBeginBtn(){
      const ready = !!studentName && !!passwordInput.value.trim();
      beginBtn.disabled = !ready;
      beginBtn.classList.toggle("active", ready);
    }
    nameInput.addEventListener("input", e=>{
      studentName = e.target.value.trim();
      nameInput.classList.toggle("has-value", !!studentName);
      updateBeginBtn();
    });
    nameInput.addEventListener("keydown", e=>{ if(e.key==="Enter") passwordInput.focus(); });
    passwordInput.addEventListener("input", ()=>{ passwordError.style.display="none"; updateBeginBtn(); });
    passwordInput.addEventListener("keydown", e=>{ if(e.key==="Enter"&&studentName&&passwordInput.value.trim()) beginExam(); });
  }
  if (beginBtn) {
    beginBtn.classList.toggle("active", false);
    beginBtn.addEventListener("click", ()=>{
      if(!studentName) return;
      const pwInput = document.getElementById("passwordInput");
      const pwError = document.getElementById("passwordError");
      if(pwInput && pwInput.value.trim() !== EXAM_PASSWORD){
        if(pwError){ pwError.style.display="block"; }
        if(pwInput){ pwInput.value=""; pwInput.focus(); }
        return;
      }
      beginExam();
    });
  }

  // EXAM — MC / Best2
  document.querySelectorAll(".option-btn").forEach(btn=>{
    btn.addEventListener("click", ()=>{
      const idx = parseInt(btn.dataset.idx);
      const q = questions[current];
      if (q.type==="mc") {
        answers[current] = [idx];
      } else {
        const prev = answers[current] || [];
        if (prev.includes(idx)) answers[current] = prev.filter(i=>i!==idx);
        else if (prev.length<2) answers[current] = [...prev,idx];
        else answers[current] = [prev[1],idx];
      }
      render();
    });
  });

  // EXAM — Matching drag & drop
  let draggingEl = null;
  document.querySelectorAll(".def-chip").forEach(chip=>{
    chip.addEventListener("dragstart", e=>{
      draggingEl = chip;
      chip.classList.add("dragging");
      const def = decodeURIComponent(chip.dataset.def);
      const fromTerm = chip.dataset.fromTerm !== undefined ? parseInt(chip.dataset.fromTerm) : null;
      dragData = {def, fromTermIdx: fromTerm};
      e.dataTransfer.effectAllowed = "move";
    });
    chip.addEventListener("dragend", ()=>{ chip.classList.remove("dragging"); draggingEl = null; });
  });

  // Drop on term rows
  document.querySelectorAll(".term-row").forEach(row=>{
    row.addEventListener("dragover", e=>{ e.preventDefault(); row.classList.add("dragover"); });
    row.addEventListener("dragleave", ()=>row.classList.remove("dragover"));
    row.addEventListener("drop", e=>{
      e.preventDefault(); row.classList.remove("dragover");
      if (!dragData) return;
      const termIdx = parseInt(row.dataset.termIdx);
      const {def, fromTermIdx} = dragData; dragData = null;
      // Remove from old slot
      if (fromTermIdx !== null && fromTermIdx !== undefined) delete matchSels[`${current}-${fromTermIdx}`];
      // Remove any slot that had this def
      Object.keys(matchSels).forEach(k=>{ if(matchSels[k]===def) delete matchSels[k]; });
      matchSels[`${current}-${termIdx}`] = def;
      saveMatchingAnswers(current);
      render();
    });
  });

  // Drop on bank (return)
  const bank = document.getElementById("defBank");
  if (bank) {
    bank.addEventListener("dragover", e=>{ e.preventDefault(); bank.classList.add("dragover"); });
    bank.addEventListener("dragleave", ()=>bank.classList.remove("dragover"));
    bank.addEventListener("drop", e=>{
      e.preventDefault(); bank.classList.remove("dragover");
      if (!dragData) return;
      const {fromTermIdx} = dragData; dragData = null;
      if (fromTermIdx !== null && fromTermIdx !== undefined) {
        delete matchSels[`${current}-${fromTermIdx}`];
        saveMatchingAnswers(current);
        render();
      }
    });
  }

  // NAV
  const prevBtn = document.getElementById("prevBtn");
  const nextBtn = document.getElementById("nextBtn");
  const submitExamBtn = document.getElementById("submitExamBtn");
  const submitTopBtn  = document.getElementById("submitTopBtn");

  if (prevBtn) prevBtn.addEventListener("click", ()=>{ if(current>0){ current--; render(); }});
  if (nextBtn) nextBtn.addEventListener("click", ()=>{ if(current<questions.length-1){ current++; render(); }});
  if (submitExamBtn) submitExamBtn.addEventListener("click", finishExam);
  if (submitTopBtn)  submitTopBtn.addEventListener("click",  finishExam);

  // Dot nav
  document.querySelectorAll(".dot").forEach(dot=>{
    dot.addEventListener("click", ()=>{ current=parseInt(dot.dataset.dot); render(); });
  });

  // Update timer display immediately
  updateTimerUI();
}

function beginExam() {
  initShuffles();
  phase = "exam";
  render();
  startTimer();
}

// ── BOOT ─────────────────────────────────────────────
document.addEventListener("DOMContentLoaded", ()=>{
  document.getElementById("root").innerHTML = "";
  render();
});
</script>

<div id="root"></div>
</body>
</html>
