  {section:"EMS Systems, EMR Role & Medical/Legal",type:"mc",stem:"Which of the following BEST describes the primary role of an Emergency Medical Responder (EMR)?",options:["Provide definitive hospital-level care at the scene","Provide immediate life-saving care with limited equipment until additional EMS resources arrive","Transport patients to the nearest emergency department","Coordinate hospital triage and bed assignments"],correct:[1],points:1},

  {section:"EMS Systems, EMR Role & Medical/Legal",type:"matching",stem:"Match each legal/ethical term with its correct definition.",pairs:[{term:"Negligence",def:"Failure to act with the standard of care expected, resulting in patient harm"},{term:"Duty to Act",def:"Legal obligation to provide care based on your role or relationship with the patient"},{term:"Expressed Consent",def:"Verbal or written agreement by a competent patient to receive treatment"},{term:"Implied Consent",def:"Assumption that an unconscious patient would consent to life-saving treatment"},{term:"Abandonment",def:"Terminating care without ensuring a qualified provider assumes responsibility"}],points:1},

  {section:"Airway Management",type:"mc",stem:"After inserting an OPA and beginning BVM ventilation on an unresponsive adult, you notice the patient's abdomen is rising instead of the chest and you hear gurgling sounds. The MOST likely explanation and BEST immediate action is:",options:["The OPA is correctly placed; the gurgling is normal airway secretion noise \u2014 continue ventilation","Gastric distention from improper technique; reposition the airway, ensure proper mask seal and ventilation technique, and prepare to suction if vomiting occurs","The OPA is too large; remove it and attempt ventilation without an adjunct","This is expected with BVM use; increase the rate of ventilation to overcome gastric inflation"],correct:[1],points:1},

const SECTION_COLORS = {
  "EMS Systems, EMR Role & Medical/Legal":      {bg:"#dbeafe", accent:"#2196F3"},
  "Anatomy, Physiology & Medical Terminology":  {bg:"#dcfce7", accent:"#4CAF50"},
  "Lifting, Moving & Patient Positioning":      {bg:"#fae8ff", accent:"#9C27B0"},
  "Airway Management":                          {bg:"#ffedd5", accent:"#FF5722"},
};

// ── STATE ────────────────────────────────────────────
// Pre-fill student name from portal URL param
const _urlParams = new URLSearchParams(window.location.search);
const _portalStudent = decodeURIComponent(_urlParams.get('student') || '').trim();

let phase        = "intro";
let studentName  = _portalStudent || "";
let current      = 0;
let answers      = Array(questions.length).fill(null);
let matchSels    = {};      // "qIdx-termIdx" -> def string
let shuffledDefs = {};      // qIdx -> shuffled def array
let timeLeft     = TOTAL_TIME;
let timerInterval= null;
let dragData     = null;    // {def, fromTermIdx}
let startTime    = null;

// ── SHUFFLE ──────────────────────────────────────────
function shuffle(arr) { return [...arr].sort(() => Math.random()-0.5); }
function initShuffles() {
  questions.forEach((q,i) => {
    if (q.type === "matching") shuffledDefs[i] = shuffle(q.pairs.map(p=>p.def));
  });
}

// ── SCORING ──────────────────────────────────────────
function scoreQuestion(q, ans) {
  if (!ans) return false;
  if (q.type === "mc")      return ans[0] === q.correct[0];
  if (q.type === "best2")   return ans.length===2 && ans.every(a=>q.correct.includes(a));
  if (q.type === "matching") return q.pairs.every((p,ti)=>ans[ti]===p.def);
  return false;
}
function calcScore() {
  let score=0, total=0;
  questions.forEach((q,i)=>{ total+=q.points; if(scoreQuestion(q,answers[i])) score+=q.points; });
  return {score,total};
}

// ── SAVE MATCHING ANS ────────────────────────────────
function saveMatchingAnswers(qIdx) {
  const q = questions[qIdx];
  answers[qIdx] = q.pairs.map((_,ti)=>matchSels[`${qIdx}-${ti}`]||null);
}

// ── TIMER ────────────────────────────────────────────
function startTimer() {
  startTime = Date.now();
  timerInterval = setInterval(()=>{
    timeLeft--;
    updateTimerUI();
    if (timeLeft <= 0) { clearInterval(timerInterval); finishExam(); }
  }, 1000);
}
function updateTimerUI() {
  const m = Math.floor(timeLeft/60), s = timeLeft%60;
  const str = `${m}:${String(s).padStart(2,"0")}`;
  const color = timeLeft<60?"#ef4444":timeLeft<180?"#f59e0b":"#22c55e";
  document.querySelectorAll(".timer-text").forEach(el=>{ el.textContent=str; el.style.color=color; });
  document.querySelectorAll(".timer-dot").forEach(el=>{ el.style.background=color; el.classList.toggle("pulse",timeLeft<60); });
  document.querySelectorAll(".timer-bar-fill").forEach(el=>{ el.style.width=`${(timeLeft/TOTAL_TIME)*100}%`; el.style.background=color; });
}

// ── SUBMIT TO GOOGLE SHEETS ──────────────────────────
// ── SUBMIT TO FIREBASE ───────────────────────────────
async function submitToFirebase(subData) {
  try {
    const url = `https://firestore.googleapis.com/v1/projects/${FB_CONFIG.projectId}/databases/(default)/documents/examResults`;
    const body = {
      fields: {
        examLabel:  {stringValue: subData.examLabel},
        category:   {stringValue: EXAM_CATEGORY},
        name:       {stringValue: subData.name},
        score:      {integerValue: subData.score},
        total:      {integerValue: subData.total},
        pct:        {integerValue: subData.pct},
        timeUsed:   {integerValue: subData.timeUsed},
        submittedAt:{stringValue: subData.submittedAt},
      }
    };
    const resp = await fetch(url + `?key=${FB_CONFIG.apiKey}`, {
      method: "POST",
      headers: {"Content-Type":"application/json"},
      body: JSON.stringify(body)
    });
    if (!resp.ok) throw new Error(await resp.text());
    return { success: true };
  } catch(e) {
    console.error("Firebase submit error:", e);
    return { success: false, error: e.toString() };
  }
}

// ── FINISH EXAM ──────────────────────────────────────
async function finishExam() {
  clearInterval(timerInterval);
  const {score,total} = calcScore();
  const pct = Math.round((score/total)*100);
  const timeUsed = TOTAL_TIME - timeLeft;
  const questionResults = questions.map((q,i)=>scoreQuestion(q,answers[i]));

  // Serialize answers for Firebase storage
  const answersData = answers.map((ans, i) => {
    const q = questions[i];
    if (ans === null || ans === undefined) return { type: q.type, given: null };
    if (q.type === 'matching') return { type: 'matching', given: ans };
    return { type: q.type, given: ans };
  });

  const subData = {
    examLabel: EXAM_LABEL,
    name: studentName,
    score, total, pct, timeUsed,
    questionResults,
    answersData,
    submittedAt: new Date().toISOString(),
  };

  phase = "submitting";
  render();

  const result = await submitToFirebase(subData);
  console.log('Submit result:', result);
  if (!result.success) {
    console.error('SUBMIT FAILED:', result.error);
  } else {
    console.log('Submit SUCCESS - score saved to Firebase');
  }
  phase = "results";
  window._submitResult = result;
  window._examScore = {score,total,pct};
  window._questionResults = questionResults;
  render();
}

  else if (phase === "submitting") root.innerHTML = renderSubmitting();
  else if (phase === "results")  root.innerHTML = renderResults();

  attachEvents();
}

  const ans = answers[current] || [];

  let questionBody = "";
  if (q.type==="mc" || q.type==="best2") {
    const hint = q.type==="best2"
      ? `<div class="best2-hint">★ Select the TWO best answers ${ans.length>0?"("+ans.length+"/2 selected)":""}</div>` : "";

    }).join("");

  } else if (q.type==="matching") {
    const defs = shuffledDefs[current] || q.pairs.map(p=>p.def);
    const usedDefs = new Set(Object.entries(matchSels).filter(([k])=>k.startsWith(current+"-")).map(([,v])=>v));
    const bankDefs = defs.filter(d=>!usedDefs.has(d));

    const bankChips = bankDefs.map(def=>`<div class="def-chip" draggable="true" data-def="${encodeURIComponent(def)}">${def}</div>`).join("") ||

        <div class="term-row ${assigned?"assigned":""}" data-term-idx="${ti}">
          <div class="term-name"><span>${pair.term}</span></div>
          <div class="term-drop">
            ${assigned
              ? `<div class="def-chip" draggable="true" data-def="${encodeURIComponent(assigned)}" data-from-term="${ti}" style="margin:0;width:100%">${assigned}</div>`
              : `<span class="term-placeholder">— drag a definition here —</span>`}

        </div>`;
    }).join("");

    questionBody = `
      <div class="match-instructions"><strong>Drag</strong> a definition from the bank and <strong>drop</strong> it onto the matching term. Drag a placed definition back to the bank to unassign it.</div>

  ).join("");

    ? `<button class="btn-next" id="nextBtn">Next →</button>`
    : `<button class="btn-submit-exam" id="submitExamBtn">Submit Exam</button>`;

  return `
    <div>
      <div class="topbar">
        <div class="topbar-inner">

            <div class="progress-bar"><div class="progress-fill" style="width:${progress}%;background:${sc.accent}"></div></div>

// ── EVENT BINDING ────────────────────────────────────
function attachEvents() {
  // INTRO
  const nameInput = document.getElementById("nameInput");
  const beginBtn  = document.getElementById("beginBtn");
  if (nameInput) {
    nameInput.value = REVIEW_MODE ? REVIEW_NAME : studentName;
    const passwordInput = document.getElementById("passwordInput");
    const passwordError = document.getElementById("passwordError");
    function updateBeginBtn(){
      const ready = !!nameInput.value.trim() && !!passwordInput.value.trim();
      if(beginBtn){ beginBtn.disabled = !ready; beginBtn.classList.toggle("active", ready); }
    }
    if (_portalStudent) {
      studentName = _portalStudent;
      nameInput.value = _portalStudent;
    }
    nameInput.addEventListener("input", e=>{
      if(!REVIEW_MODE && !_portalStudent){ studentName = e.target.value.trim(); nameInput.classList.toggle("has-value", !!studentName); }
      updateBeginBtn();
    });
    nameInput.addEventListener("keydown", e=>{ if(e.key==="Enter") passwordInput.focus(); });
    passwordInput.addEventListener("input", ()=>{ if(passwordError) passwordError.style.display="none"; updateBeginBtn(); });
    passwordInput.addEventListener("keydown", e=>{
      if(e.key==="Enter" && nameInput.value.trim() && passwordInput.value.trim()){
        REVIEW_MODE ? handleReviewBegin() : beginExam();
      }
    });
  }
  if (beginBtn) {
    if(!REVIEW_MODE){ beginBtn.classList.toggle("active", false); }
    beginBtn.addEventListener("click", ()=>{
      const pwInput = document.getElementById("passwordInput");
      const pwError = document.getElementById("passwordError");
      const revError = document.getElementById("reviewError");
      if(pwInput && pwInput.value.trim() !== EXAM_PASSWORD){
        if(pwError){ pwError.style.display="block"; }
        if(pwInput){ pwInput.value=""; pwInput.focus(); }
        return;
      }
      if(REVIEW_MODE){ handleReviewBegin(); return; }
      if(!studentName) return;
      beginExam();
    });
  }

  // EXAM — MC / Best2
  document.querySelectorAll(".option-btn").forEach(btn=>{
    btn.addEventListener("click", ()=>{
      const idx = parseInt(btn.dataset.idx);
      const q = questions[current];
      if (q.type==="mc") {
        answers[current] = [idx];
      } else {
        const prev = answers[current] || [];
        if (prev.includes(idx)) answers[current] = prev.filter(i=>i!==idx);
        else if (prev.length<2) answers[current] = [...prev,idx];
        else answers[current] = [prev[1],idx];
      }
      render();
    });
  });

  // EXAM — Matching drag & drop
  let draggingEl = null;
  document.querySelectorAll(".def-chip").forEach(chip=>{
    chip.addEventListener("dragstart", e=>{
      draggingEl = chip;
      chip.classList.add("dragging");
      const def = decodeURIComponent(chip.dataset.def);
      const fromTerm = chip.dataset.fromTerm !== undefined ? parseInt(chip.dataset.fromTerm) : null;
      dragData = {def, fromTermIdx: fromTerm};
      e.dataTransfer.effectAllowed = "move";
    });
    chip.addEventListener("dragend", ()=>{ chip.classList.remove("dragging"); draggingEl = null; });
  });

  // Drop on term rows
  document.querySelectorAll(".term-row").forEach(row=>{
    row.addEventListener("dragover", e=>{ e.preventDefault(); row.classList.add("dragover"); });
    row.addEventListener("dragleave", ()=>row.classList.remove("dragover"));
    row.addEventListener("drop", e=>{
      e.preventDefault(); row.classList.remove("dragover");
      if (!dragData) return;
      const termIdx = parseInt(row.dataset.termIdx);
      const {def, fromTermIdx} = dragData; dragData = null;
      // Remove from old slot
      if (fromTermIdx !== null && fromTermIdx !== undefined) delete matchSels[`${current}-${fromTermIdx}`];
      // Remove any slot that had this def
      Object.keys(matchSels).forEach(k=>{ if(matchSels[k]===def) delete matchSels[k]; });
      matchSels[`${current}-${termIdx}`] = def;
      saveMatchingAnswers(current);
      render();
    });
  });

  // Drop on bank (return)
  const bank = document.getElementById("defBank");
  if (bank) {
    bank.addEventListener("dragover", e=>{ e.preventDefault(); bank.classList.add("dragover"); });
    bank.addEventListener("dragleave", ()=>bank.classList.remove("dragover"));
    bank.addEventListener("drop", e=>{
      e.preventDefault(); bank.classList.remove("dragover");
      if (!dragData) return;
      const {fromTermIdx} = dragData; dragData = null;
      if (fromTermIdx !== null && fromTermIdx !== undefined) {
        delete matchSels[`${current}-${fromTermIdx}`];
        saveMatchingAnswers(current);
        render();
      }
    });
  }

  // NAV
  const prevBtn = document.getElementById("prevBtn");
  const nextBtn = document.getElementById("nextBtn");
  const submitExamBtn = document.getElementById("submitExamBtn");
  const submitTopBtn  = document.getElementById("submitTopBtn");

  if (prevBtn) prevBtn.addEventListener("click", ()=>{ if(current>0){ current--; render(); }});
  if (nextBtn) nextBtn.addEventListener("click", ()=>{ if(current<questions.length-1){ current++; render(); }});
  if (submitExamBtn) submitExamBtn.addEventListener("click", finishExam);
  if (submitTopBtn)  submitTopBtn.addEventListener("click",  finishExam);

  // Dot nav
  document.querySelectorAll(".dot").forEach(dot=>{
    dot.addEventListener("click", ()=>{ current=parseInt(dot.dataset.dot); render(); });
  });

  // Update timer display immediately
  updateTimerUI();
}

  const nameVal = document.getElementById("nameInput")?.value.trim() || REVIEW_NAME;
  const root = document.getElementById("root");

    phase = "review_intro";
    render();
    const revError = document.getElementById("reviewError");
    if(revError) revError.style.display = "block";

  phase = "review";
  render();
}

const REVIEW_MODE = new URLSearchParams(window.location.search).get('review') === '1';
const REVIEW_NAME = decodeURIComponent(new URLSearchParams(window.location.search).get('name') || '');
let reviewData = null; // loaded from Firebase

async function loadReviewData(name) {
  try {
    // Filter by name only (no composite index needed), then match examLabel client-side
    const url = `https://firestore.googleapis.com/v1/projects/${FB_CONFIG.projectId}/databases/(default)/documents:runQuery?key=${FB_CONFIG.apiKey}`;
    const body = {
      structuredQuery: {
        from: [{ collectionId: "examResults" }],
        where: {
          fieldFilter: {
            field: { fieldPath: "name" },
            op: "EQUAL",
            value: { stringValue: name }
          }
        }
      }
    };
    const resp = await fetch(url, { method: "POST", headers: {"Content-Type":"application/json"}, body: JSON.stringify(body) });
    const results = await resp.json();
    // Filter client-side by examLabel, keep best score
    let best = null;
    for (const item of results) {
      if (!item.document) continue;
      const f = item.document.fields;
      const label = f.examLabel?.stringValue || "";
      if (label !== EXAM_LABEL) continue; // match this exam only
      const pct = parseInt(f.pct?.integerValue || f.pct?.stringValue || 0);
      if (!best || pct > best.pct) {
        best = {
          pct,
          score: parseInt(f.score?.integerValue || f.score?.stringValue || 0),
          total: parseInt(f.total?.integerValue || f.total?.stringValue || 0),
          answersData: f.answersData?.stringValue ? JSON.parse(f.answersData.stringValue) : null,
          submittedAt: f.submittedAt?.stringValue || "",
        };
      }
    }
    return best;
  } catch(e) {
    console.error("loadReviewData error:", e);
    return null;
  }
}

        <input class="name-input" id="nameInput" type="text" value="${REVIEW_NAME || _portalStudent}" placeholder="Enter your full name..." autocomplete="off" ${(REVIEW_NAME || _portalStudent) ? 'readonly style="background:#e6f0fb;color:#1e3a5f;cursor:default;border-color:#93c5fd;"' : ""}>
        <label class="name-label" style="margin-top:4px;">Exam Password</label>
        <input class="name-input" id="passwordInput" type="password" placeholder="Enter the exam password..." autocomplete="off">
        <div id="passwordError" style="color:#ef4444;font-size:13px;margin:-16px 0 16px;display:none;">Incorrect password. Please try again.</div>
        <div id="reviewError" style="color:#ef4444;font-size:13px;margin:-16px 0 16px;display:none;">No submission found for that name. Make sure it matches exactly.</div>
        <br>
        <button class="btn-begin active" id="beginBtn" style="background:#2563eb">Load My Results</button>
      </div>
    </div>`;
}

function renderReview() {
  const rd = reviewData;
  if (!rd) return `<div style="padding:40px;text-align:center;color:#f87171">No submission data found.</div>`;

  const lc = rd.pct >= 70 ? '#16a34a' : '#dc2626';
  const passed = rd.pct >= 70;

  // Build question review
  let qHtml = '';
  questions.forEach((q, i) => {
    const savedAns = rd.answersData ? rd.answersData[i] : null;
    const givenAns = savedAns?.given ?? null;
    const correct = scoreQuestion(q, givenAns);
    const ic = correct ? '#16a34a' : '#dc2626';
    const ibg = correct ? '#f0fdf4' : '#fef2f2';
    const ibd = correct ? '#bbf7d0' : '#fecaca';

    qHtml += `<div style="background:${ibg};border:2px solid ${ibd};border-radius:12px;padding:20px 24px;margin-bottom:16px;">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;">
        <span style="font-size:12px;color:#6b82a0;letter-spacing:2px;text-transform:uppercase;">Question ${i+1}</span>
        <span style="font-weight:700;color:${ic};font-size:14px;">${correct ? '✓ Correct' : '✗ Incorrect'} · ${q.points} pt${q.points>1?'s':''}</span>
      </div>
      <div style="font-size:16px;color:#1e3a5f;line-height:1.6;margin-bottom:16px;">${q.stem}</div>`;

    if (q.type === 'mc' || q.type === 'best2') {
      const correctIdxs = q.type === 'mc' ? (q.correct || [q.answer]) : (q.correct || q.answers || []);
      const givenIdxs = Array.isArray(givenAns) ? givenAns : [];
      qHtml += q.options.map((opt, oi) => {
        const isCorrect = correctIdxs.includes(oi);
        const isGiven = givenIdxs.includes(oi);
        let bg = '#ffffff', border = '#bfdbfe', color = '#1e3a5f', prefix = '';
        if (isCorrect && isGiven)  { bg = '#dcfce7'; border = '#16a34a'; color = '#166534'; prefix = '✓ '; }
        else if (isCorrect)        { bg = '#dcfce7'; border = '#16a34a'; color = '#166534'; prefix = '✓ '; }
        else if (isGiven)          { bg = '#fee2e2'; border = '#dc2626'; color = '#991b1b'; prefix = '✗ '; }
        return `<div style="background:${bg};border:2px solid ${border};border-radius:8px;padding:10px 14px;margin-bottom:6px;color:${color};font-size:14px;">${prefix}${opt}</div>`;
      }).join('');
      if (givenIdxs.length === 0) qHtml += `<div style="color:#93adc8;font-size:13px;font-style:italic;">No answer selected</div>`;
    } else if (q.type === 'matching') {
      const givenPairs = Array.isArray(givenAns) ? givenAns : [];
      qHtml += q.pairs.map((pair, pi) => {
        const given = givenPairs[pi];
        const isCorrect = given === pair.def;
        return `<div style="display:flex;gap:12px;align-items:center;margin-bottom:8px;">
          <div style="flex:1;background:#e6f0fb;border-radius:6px;padding:8px 12px;font-size:13px;font-weight:700;color:#1e3a5f;">${pair.term}</div>
          <div style="flex:2;background:${isCorrect?'#dcfce7':'#fee2e2'};border:1px solid ${isCorrect?'#16a34a':'#dc2626'};border-radius:6px;padding:8px 12px;font-size:13px;color:${isCorrect?'#166534':'#991b1b'};">
            ${given || '<em style="color:#93adc8">No answer</em>'} ${isCorrect ? '✓' : `✗ (correct: ${pair.def})`}
          </div>
        </div>`;
      }).join('');
    }

    qHtml += `</div>`;
  });

  return `
    <div style="min-height:100vh;background:#f0f6ff;padding:32px 16px;font-family:Georgia,serif;">
      <div style="max-width:760px;margin:0 auto;">
        <div style="background:#fff;border-radius:16px;padding:28px 32px;margin-bottom:24px;border:2px solid ${rd.pct>=70?'#bbf7d0':'#fecaca'};box-shadow:0 4px 16px rgba(0,0,0,0.06);">
          <div style="font-size:12px;letter-spacing:3px;text-transform:uppercase;color:#6b82a0;margin-bottom:8px;">Exam Review · ${EXAM_LABEL}</div>
          <div style="font-size:42px;font-weight:700;color:${lc};">${rd.pct}%</div>
          <div style="font-size:16px;color:#4a6080;margin-top:4px;">${rd.score} / ${rd.total} points · ${passed ? '✓ Passed' : '✗ Did not pass'}</div>
          <div style="font-size:12px;color:#93adc8;margin-top:8px;">Submitted ${new Date(rd.submittedAt).toLocaleDateString('en-US',{month:'long',day:'numeric',year:'numeric'})}</div>
        </div>
        ${qHtml}
        <div style="text-align:center;margin-top:24px;">
          <a href="${window.location.pathname.split('?')[0]}" style="color:#6b82a0;font-size:13px;">← Back to Portal</a>
        </div>
      </div>
    </div>`;
}

// ── BOOT ─────────────────────────────────────────────
document.addEventListener("DOMContentLoaded", async ()=>{
  document.getElementById("root").innerHTML = "";
  if (REVIEW_MODE) {
    phase = "review_intro";
  }
  render();
});
</script>

<div id="root"></div>
</body>
</html>
