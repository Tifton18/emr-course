  .dot { height: 10px; border-radius: 5px; cursor: pointer; transition: all 0.2s; background: #93c5fd; }

  /* ── RESULTS ── */
  .results-wrap { min-height: 100vh; padding: 40px 20px; font-family: Georgia, serif; }

  .results-hero { text-align: center; margin-bottom: 40px; }

  .result-row:last-child { border-bottom: none; }
  .result-badge { width: 28px; height: 28px; border-radius: 50%; display: flex; align-items: center; justify-content: center; color: #1e3a5f; font-size: 13px; font-weight: 700; flex-shrink: 0; margin-top: 2px; }
  .result-badge.correct { background: #2e7d32; }
  .result-badge.wrong { background: #c62828; }
  .result-stem { color: #1e3a5f; font-size: 14px; margin-bottom: 4px; }
  .result-correct-ans { font-size: 13px; color: #81c784; }
  .result-pts { font-weight: 700; font-size: 14px; flex-shrink: 0; }
  .submitting-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.7); display: flex; align-items: center; justify-content: center; z-index: 200; flex-direction: column; gap: 16px; }
  .submitting-spinner { width: 48px; height: 48px; border: 4px solid #bfdbfe; border-top-color: #2563eb; border-radius: 50%; animation: spin 0.8s linear infinite; }
  .submitting-text { color: #1e3a5f; font-size: 16px; }
  .submit-status { text-align: center; padding: 16px; border-radius: 12px; margin-bottom: 24px; font-size: 14px; }
  .submit-status.success { background: #dcfce7; border: 1px solid #166534; color: #86efac; }
  .submit-status.error { background: #fee2e2; border: 1px solid #7f1d1d; color: #fca5a5; }

  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }
  @keyframes spin { to { transform: rotate(360deg); } }
</style>

const LETTERS         = ["A","B","C","D","E"];

// ── QUESTION DATA ────────────────────────────────────
const questions = [
  {section:"EMS Systems, EMR Role & Medical/Legal",type:"mc",stem:"Which of the following BEST describes the 'standard of care' as it applies to an EMR?",options:["The care a physician would provide in the same situation","The care a reasonable, similarly trained EMR would provide in the same or similar circumstances","Any treatment that prevents patient death","The minimum treatment listed in state protocols"],correct:[1],points:1},
  {section:"EMS Systems, EMR Role & Medical/Legal",type:"mc",stem:"An EMR arrives on scene and a patient who appears intoxicated loudly refuses care. Which of the following is the MOST appropriate initial action?",options:["Leave the scene immediately and document the refusal","Restrain the patient to perform a rapid assessment","Attempt to assess the patient's decision-making capacity; if mental status is impaired, implied consent may apply","Contact the patient's employer before taking any action"],correct:[2],points:1},
  {section:"EMS Systems, EMR Role & Medical/Legal",type:"mc",stem:"Which of the following statements about Good Samaritan laws is MOST accurate?",options:["They provide absolute protection from all lawsuits regardless of actions taken","They generally protect off-duty providers who respond in good faith and act within the scope of their training","They apply only to physicians responding off duty","They eliminate the need for documentation when acting as a Good Samaritan"],correct:[1],points:1},
  {section:"EMS Systems, EMR Role & Medical/Legal",type:"mc",stem:"A valid DNR order means the EMR should:",options:["Withhold all care including positioning, oxygen, and comfort measures","Not perform resuscitation but may still provide comfort care and supportive measures","Contact medical direction before looking at the order","Disregard the order until a physician arrives on scene"],correct:[1],points:1},
  {section:"EMS Systems, EMR Role & Medical/Legal",type:"best2",stem:"Which TWO elements are required for a patient's refusal of care to be legally valid?",options:["The patient is a competent adult who understands the risks of refusal","The patient must be at least 21 years old","The patient has been informed of potential consequences of refusing","Refusal must always be witnessed by law enforcement","The patient must sign a refusal form before the EMR arrives"],correct:[0,2],points:1},
  {section:"EMS Systems, EMR Role & Medical/Legal",type:"mc",stem:"Under HIPAA, which of the following represents an allowable disclosure of protected health information WITHOUT the patient's explicit authorization?",options:["Sharing the patient's diagnosis with their employer","Releasing information to other treating healthcare providers involved in the patient's care","Providing a full patient history to a news crew at a multi-vehicle crash","Discussing the patient's history with their neighbors"],correct:[1],points:1},
  {section:"EMS Systems, EMR Role & Medical/Legal",type:"mc",stem:"Which of the following BEST describes the difference between negligence and abandonment?",options:["They are legally the same; both result from substandard care","Negligence involves a failure to meet the standard of care causing harm; abandonment is terminating care without ensuring a qualified provider takes over","Abandonment only occurs when a patient is left at the hospital","Negligence requires proof of intent; abandonment does not"],correct:[1],points:1},
  {section:"EMS Systems, EMR Role & Medical/Legal",type:"matching",stem:"Match each legal or ethical term with its correct definition.",pairs:[{term:"Expressed Consent",def:"Verbal or written agreement by a competent, informed patient to receive treatment"},{term:"Implied Consent",def:"Legal assumption that an unconscious or incapacitated patient would consent to life-saving treatment"},{term:"Negligence",def:"Failure to act with the expected standard of care that results in patient harm"},{term:"Scope of Practice",def:"The legal boundary defining what procedures an EMR is authorized to perform"},{term:"Mandatory Reporting",def:"Legal obligation to report suspected abuse, neglect, or certain communicable diseases to authorities"}],points:1},
  {section:"Anatomy, Physiology & Medical Terminology",type:"mc",stem:"A wound is described as being on the 'lateral aspect of the right forearm.' This means the wound is located:",options:["On the palm side of the right forearm near the midline","On the outer side of the right forearm, away from the midline","On the inner side of the right forearm near the body","On the posterior (back) surface of the right forearm"],correct:[1],points:1},
  {section:"Anatomy, Physiology & Medical Terminology",type:"mc",stem:"The medical prefix 'tachy-' means:",options:["Slow","Painful","Fast","Absence of"],correct:[2],points:1},
  {section:"Anatomy, Physiology & Medical Terminology",type:"mc",stem:"The mitral and tricuspid valves of the heart prevent:",options:["Blood from flowing from the aorta back into the left ventricle","Blood from flowing backward from the ventricles into the atria","Blood from mixing between the right and left sides of the heart","Oxygen from being removed from the blood during circulation"],correct:[1],points:1},
  {section:"Anatomy, Physiology & Medical Terminology",type:"mc",stem:"Which of the following BEST explains why a patient in decompensated shock has an altered mental status?",options:["Excessive pain signals are overwhelming the central nervous system","Inadequate perfusion to the brain is causing cerebral hypoxia","Systemic inflammation is triggering a fever that alters cognition","The patient's blood glucose level has increased, affecting brain function"],correct:[1],points:1},
  {section:"Anatomy, Physiology & Medical Terminology",type:"best2",stem:"Which TWO physiological changes does the body use during the compensatory phase of shock to maintain blood pressure?",options:["Increased heart rate","Peripheral vasodilation to reduce afterload","Peripheral vasoconstriction to maintain central perfusion","Decreased respiratory rate to conserve energy","Dilation of coronary arteries only"],correct:[0,2],points:1},
  {section:"Anatomy, Physiology & Medical Terminology",type:"mc",stem:"Which organ is primarily responsible for filtering blood and producing urine?",options:["Liver","Pancreas","Kidney","Spleen"],correct:[2],points:1},
  {section:"Anatomy, Physiology & Medical Terminology",type:"mc",stem:"The epiglottis serves which of the following functions during swallowing?",options:["It propels food down the esophagus using peristalsis","It covers the trachea to prevent food and liquid from entering the airway","It filters air entering the lungs","It regulates the amount of air entering the alveoli"],correct:[1],points:1},
  {section:"Anatomy, Physiology & Medical Terminology",type:"matching",stem:"Match each anatomical directional term with its correct meaning.",pairs:[{term:"Anterior",def:"Toward the front of the body"},{term:"Superior",def:"Toward the head or above another structure"},{term:"Medial",def:"Toward the midline of the body"},{term:"Distal",def:"Farther from the point of attachment or origin"},{term:"Prone",def:"Lying face-down"}],points:1},
  {section:"Lifting, Moving & Patient Positioning",type:"mc",stem:"When using the power lift to move a patient, which of the following is MOST important to prevent rescuer injury?",options:["Lock the back in a slightly curved position for flexibility","Keep the weight close to the body with the back straight and lift using the legs","Lean forward at the waist to use body weight as leverage","Bend the knees only slightly to maintain maximum height advantage"],correct:[1],points:1},
  {section:"Lifting, Moving & Patient Positioning",type:"mc",stem:"A patient found unresponsive on the floor is breathing adequately with no suspected spinal injury. Which position is MOST appropriate while awaiting transport?",options:["Supine with legs elevated","Recovery position (left lateral recumbent)","Fowler's position (45 degrees upright)","Prone position"],correct:[1],points:1},
  {section:"Lifting, Moving & Patient Positioning",type:"mc",stem:"Which of the following patients should be placed in the left lateral recumbent (recovery) position rather than supine?",options:["A patient in respiratory distress with active wheezing","A patient with suspected tension pneumothorax","A conscious patient who is actively vomiting and has no spinal injury concern","A patient with suspected acute myocardial infarction and stable vitals"],correct:[2],points:1},
  {section:"Airway Management",type:"mc",stem:"An NPA is preferred over an OPA in which of the following situations?",options:["The patient is completely unresponsive with no gag reflex","The patient is semi-conscious and has an intact gag reflex","The patient has suspected nasal fractures","The patient is in respiratory arrest and needs positive pressure ventilation"],correct:[1],points:1},
  {section:"Airway Management",type:"mc",stem:"You are ventilating an adult patient with a BVM at a rate of 10 breaths per minute. Each breath should be delivered over approximately:",options:["0.5 seconds","1 second","3 seconds","5 seconds"],correct:[1],points:1},
  {section:"Airway Management",type:"mc",stem:"When suctioning a patient's oropharynx, the catheter should be inserted:",options:["Only as far as you can visualize, then suction applied on withdrawal","As deep as possible to clear secretions from the lower airway","While continuously applying suction during insertion and withdrawal","With the suction turned off during insertion and only activated at maximum depth"],correct:[0],points:1},
  {section:"Airway Management",type:"mc",stem:"A patient develops stridor after being stung by a bee and has hives and facial swelling. The MOST likely cause of the stridor is:",options:["Bronchospasm from allergic asthma","Upper airway angioedema causing partial obstruction of the larynx","Aspiration of the stinger","Pulmonary edema from anaphylactic cardiac depression"],correct:[1],points:1},
  {section:"Airway Management",type:"best2",stem:"Which TWO of the following correctly describe appropriate oxygen delivery for a patient with adequate breathing and an SpO2 of 94%?",options:["Nasal cannula at 2 to 4 LPM is an appropriate initial choice","Non-rebreather mask at 15 LPM is required for all patients with SpO2 under 98%","Target SpO2 of 94 to 99% rather than 100% in most adult patients","Withhold oxygen entirely until SpO2 drops below 90%","Use a BVM for all patients with SpO2 under 97%"],correct:[0,2],points:1},
  {section:"Ventilation & Breathing Assessment",type:"mc",stem:"An adult patient has a respiratory rate of 6 breaths per minute with shallow, inadequate chest rise. The MOST appropriate intervention is:",options:["Administer oxygen via nasal cannula and monitor closely","Assist ventilations with BVM at 10 to 12 breaths per minute","Encourage the patient to breathe more deeply","Position in Fowler's and reassess in two minutes"],correct:[1],points:1},
  {section:"Ventilation & Breathing Assessment",type:"mc",stem:"Tripod positioning (leaning forward with hands on knees) is MOST associated with:",options:["Abdominal pain requiring a position of comfort","Significant respiratory distress; the patient is using accessory muscles and maximizing airway diameter","Hypotension causing the patient to lean forward to increase venous return","Neurological impairment affecting upright posture"],correct:[1],points:1},
  {section:"Ventilation & Breathing Assessment",type:"mc",stem:"Which of the following breath sounds is MOST consistent with lower airway bronchospasm?",options:["Stridor","Crackles (rales)","Wheezing","Gurgling"],correct:[2],points:1},
  {section:"Ventilation & Breathing Assessment",type:"mc",stem:"A patient with a suspected tension pneumothorax would MOST likely present with which of the following combinations?",options:["Bilateral crackles, pink frothy sputum, elevated JVD","Absent breath sounds on one side, tracheal deviation away from the affected side, hypotension, and JVD","Bilateral wheezing, prolonged expiration, accessory muscle use","Fever, productive cough, and unilateral crackles"],correct:[1],points:1},

// ── STATE ────────────────────────────────────────────
let phase        = "intro";
let studentName  = "";
let current      = 0;
let answers      = Array(questions.length).fill(null);
let matchSels    = {};      // "qIdx-termIdx" -> def string
let shuffledDefs = {};      // qIdx -> shuffled def array
let timeLeft     = TOTAL_TIME;
let timerInterval= null;
let dragData     = null;    // {def, fromTermIdx}
let startTime    = null;

// ── SHUFFLE ──────────────────────────────────────────
function shuffle(arr) { return [...arr].sort(() => Math.random()-0.5); }
function initShuffles() {
  questions.forEach((q,i) => {
    if (q.type === "matching") shuffledDefs[i] = shuffle(q.pairs.map(p=>p.def));
  });
}

// ── SCORING ──────────────────────────────────────────
function scoreQuestion(q, ans) {
  if (!ans) return false;
  if (q.type === "mc")      return ans[0] === q.correct[0];
  if (q.type === "best2")   return ans.length===2 && ans.every(a=>q.correct.includes(a));
  if (q.type === "matching") return q.pairs.every((p,ti)=>ans[ti]===p.def);
  return false;
}
function calcScore() {
  let score=0, total=0;
  questions.forEach((q,i)=>{ total+=q.points; if(scoreQuestion(q,answers[i])) score+=q.points; });
  return {score,total};
}

// ── SAVE MATCHING ANS ────────────────────────────────
function saveMatchingAnswers(qIdx) {
  const q = questions[qIdx];
  answers[qIdx] = q.pairs.map((_,ti)=>matchSels[`${qIdx}-${ti}`]||null);
}

// ── TIMER ────────────────────────────────────────────
function startTimer() {
  startTime = Date.now();
  timerInterval = setInterval(()=>{
    timeLeft--;
    updateTimerUI();
    if (timeLeft <= 0) { clearInterval(timerInterval); finishExam(); }
  }, 1000);
}
function updateTimerUI() {
  const m = Math.floor(timeLeft/60), s = timeLeft%60;
  const str = `${m}:${String(s).padStart(2,"0")}`;
  const color = timeLeft<60?"#ef4444":timeLeft<180?"#f59e0b":"#22c55e";
  document.querySelectorAll(".timer-text").forEach(el=>{ el.textContent=str; el.style.color=color; });
  document.querySelectorAll(".timer-dot").forEach(el=>{ el.style.background=color; el.classList.toggle("pulse",timeLeft<60); });
  document.querySelectorAll(".timer-bar-fill").forEach(el=>{ el.style.width=`${(timeLeft/TOTAL_TIME)*100}%`; el.style.background=color; });
}

// ── SUBMIT TO FIREBASE ───────────────────────────────
async function submitToFirebase(subData) {
  try {
    const url = `https://firestore.googleapis.com/v1/projects/${FB_CONFIG.projectId}/databases/(default)/documents/examResults`;
    const body = {
      fields: {
        examLabel:  {stringValue: subData.examLabel},
        category:   {stringValue: EXAM_CATEGORY},
        name:       {stringValue: subData.name},
        score:      {integerValue: subData.score},
        total:      {integerValue: subData.total},
        pct:        {integerValue: subData.pct},
        timeUsed:   {integerValue: subData.timeUsed},
        submittedAt:{stringValue: subData.submittedAt},
      }
    };
    const resp = await fetch(url + `?key=${FB_CONFIG.apiKey}`, {
      method: "POST",
      headers: {"Content-Type":"application/json"},
      body: JSON.stringify(body)
    });
    if (!resp.ok) throw new Error(await resp.text());
    return { success: true };
  } catch(e) {
    console.error("Firebase submit error:", e);
    return { success: false, error: e.toString() };
  }
}

// ── FINISH EXAM ──────────────────────────────────────
async function finishExam() {
  clearInterval(timerInterval);
  const {score,total} = calcScore();
  const pct = Math.round((score/total)*100);
  const timeUsed = TOTAL_TIME - timeLeft;
  const questionResults = questions.map((q,i)=>scoreQuestion(q,answers[i]));

  // Serialize answers for Firebase storage
  const answersData = answers.map((ans, i) => {
    const q = questions[i];
    if (ans === null || ans === undefined) return { type: q.type, given: null };
    if (q.type === 'matching') return { type: 'matching', given: ans };
    return { type: q.type, given: ans };
  });

  const subData = {
    examLabel: EXAM_LABEL,
    name: studentName,
    score, total, pct, timeUsed,
    questionResults,
    answersData,
    submittedAt: new Date().toISOString(),
  };

  phase = "submitting";
  render();

  const result = await submitToFirebase(subData);
  console.log('Submit result:', result);
  if (!result.success) {
    console.error('SUBMIT FAILED:', result.error);
  } else {
    console.log('Submit SUCCESS - score saved to Firebase');
  }
  phase = "results";
  window._submitResult = result;
  window._examScore = {score,total,pct};
  window._questionResults = questionResults;
  render();
}

// ── RENDER ───────────────────────────────────────────
function render() {
  const root = document.getElementById("root");
  if (phase === "review_intro")  root.innerHTML = renderReviewIntro();
  else if (phase === "review")   root.innerHTML = renderReview();
  else if (phase === "intro")    root.innerHTML = renderIntro();
  else if (phase === "submitting") root.innerHTML = renderSubmitting();
  else if (phase === "results")  root.innerHTML = renderResults();
  else                           root.innerHTML = renderExam();
  attachEvents();
}

// ── EVENT BINDING ────────────────────────────────────
function attachEvents() {
  // INTRO
  const nameInput = document.getElementById("nameInput");
  const beginBtn  = document.getElementById("beginBtn");
  if (nameInput) {
    nameInput.value = REVIEW_MODE ? REVIEW_NAME : studentName;
    const passwordInput = document.getElementById("passwordInput");
    const passwordError = document.getElementById("passwordError");
    function updateBeginBtn(){
      const ready = !!nameInput.value.trim() && !!passwordInput.value.trim();
      if(beginBtn){ beginBtn.disabled = !ready; beginBtn.classList.toggle("active", ready); }
    }
    nameInput.addEventListener("input", e=>{
      if(!REVIEW_MODE){ studentName = e.target.value.trim(); nameInput.classList.toggle("has-value", !!studentName); }
      updateBeginBtn();
    });
    nameInput.addEventListener("keydown", e=>{ if(e.key==="Enter") passwordInput.focus(); });
    passwordInput.addEventListener("input", ()=>{ if(passwordError) passwordError.style.display="none"; updateBeginBtn(); });
    passwordInput.addEventListener("keydown", e=>{
      if(e.key==="Enter" && nameInput.value.trim() && passwordInput.value.trim()){
        REVIEW_MODE ? handleReviewBegin() : beginExam();
      }
    });
  }
  if (beginBtn) {
    if(!REVIEW_MODE){ beginBtn.classList.toggle("active", false); }
    beginBtn.addEventListener("click", ()=>{
      const pwInput = document.getElementById("passwordInput");
      const pwError = document.getElementById("passwordError");
      const revError = document.getElementById("reviewError");
      if(pwInput && pwInput.value.trim() !== EXAM_PASSWORD){
        if(pwError){ pwError.style.display="block"; }
        if(pwInput){ pwInput.value=""; pwInput.focus(); }
        return;
      }
      if(REVIEW_MODE){ handleReviewBegin(); return; }
      if(!studentName) return;
      beginExam();
    });
  }

  // EXAM — MC / Best2
  document.querySelectorAll(".option-btn").forEach(btn=>{
    btn.addEventListener("click", ()=>{
      const idx = parseInt(btn.dataset.idx);
      const q = questions[current];
      if (q.type==="mc") {
        answers[current] = [idx];
      } else {
        const prev = answers[current] || [];
        if (prev.includes(idx)) answers[current] = prev.filter(i=>i!==idx);
        else if (prev.length<2) answers[current] = [...prev,idx];
        else answers[current] = [prev[1],idx];
      }
      render();
    });
  });

  // EXAM — Matching drag & drop
  let draggingEl = null;
  document.querySelectorAll(".def-chip").forEach(chip=>{
    chip.addEventListener("dragstart", e=>{
      draggingEl = chip;
      chip.classList.add("dragging");
      const def = decodeURIComponent(chip.dataset.def);
      const fromTerm = chip.dataset.fromTerm !== undefined ? parseInt(chip.dataset.fromTerm) : null;
      dragData = {def, fromTermIdx: fromTerm};
      e.dataTransfer.effectAllowed = "move";
    });
    chip.addEventListener("dragend", ()=>{ chip.classList.remove("dragging"); draggingEl = null; });
  });

  // Drop on term rows
  document.querySelectorAll(".term-row").forEach(row=>{
    row.addEventListener("dragover", e=>{ e.preventDefault(); row.classList.add("dragover"); });
    row.addEventListener("dragleave", ()=>row.classList.remove("dragover"));
    row.addEventListener("drop", e=>{
      e.preventDefault(); row.classList.remove("dragover");
      if (!dragData) return;
      const termIdx = parseInt(row.dataset.termIdx);
      const {def, fromTermIdx} = dragData; dragData = null;
      // Remove from old slot
      if (fromTermIdx !== null && fromTermIdx !== undefined) delete matchSels[`${current}-${fromTermIdx}`];
      // Remove any slot that had this def
      Object.keys(matchSels).forEach(k=>{ if(matchSels[k]===def) delete matchSels[k]; });
      matchSels[`${current}-${termIdx}`] = def;
      saveMatchingAnswers(current);
      render();
    });
  });

  // Drop on bank (return)
  const bank = document.getElementById("defBank");
  if (bank) {
    bank.addEventListener("dragover", e=>{ e.preventDefault(); bank.classList.add("dragover"); });
    bank.addEventListener("dragleave", ()=>bank.classList.remove("dragover"));
    bank.addEventListener("drop", e=>{
      e.preventDefault(); bank.classList.remove("dragover");
      if (!dragData) return;
      const {fromTermIdx} = dragData; dragData = null;
      if (fromTermIdx !== null && fromTermIdx !== undefined) {
        delete matchSels[`${current}-${fromTermIdx}`];
        saveMatchingAnswers(current);
        render();
      }
    });
  }

  // NAV
  const prevBtn = document.getElementById("prevBtn");
  const nextBtn = document.getElementById("nextBtn");
  const submitExamBtn = document.getElementById("submitExamBtn");
  const submitTopBtn  = document.getElementById("submitTopBtn");

  if (prevBtn) prevBtn.addEventListener("click", ()=>{ if(current>0){ current--; render(); }});
  if (nextBtn) nextBtn.addEventListener("click", ()=>{ if(current<questions.length-1){ current++; render(); }});
  if (submitExamBtn) submitExamBtn.addEventListener("click", finishExam);
  if (submitTopBtn)  submitTopBtn.addEventListener("click",  finishExam);

  // Dot nav
  document.querySelectorAll(".dot").forEach(dot=>{
    dot.addEventListener("click", ()=>{ current=parseInt(dot.dataset.dot); render(); });
  });

  // Update timer display immediately
  updateTimerUI();
}

async function handleReviewBegin() {
  const nameVal = document.getElementById("nameInput")?.value.trim() || REVIEW_NAME;
  const root = document.getElementById("root");
  if(root) root.innerHTML = `<div style="min-height:100vh;background:#f0f6ff;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:20px;font-family:Georgia,serif;"><div style="font-size:18px;color:#4a6080;">Loading your results…</div></div>`;
  reviewData = await loadReviewData(nameVal);
  if (!reviewData) {
    phase = "review_intro";
    render();
    const revError = document.getElementById("reviewError");
    if(revError) revError.style.display = "block";
    return;
  }
  phase = "review";
  render();
}

function beginExam() {
  initShuffles();
  phase = "exam";
  render();
  startTimer();
}

// ── REVIEW MODE ──────────────────────────────────────
const REVIEW_MODE = new URLSearchParams(window.location.search).get('review') === '1';
const REVIEW_NAME = decodeURIComponent(new URLSearchParams(window.location.search).get('name') || '');
let reviewData = null; // loaded from Firebase

async function loadReviewData(name) {
  try {
    const url = `https://firestore.googleapis.com/v1/projects/${FB_CONFIG.projectId}/databases/(default)/documents:runQuery?key=${FB_CONFIG.apiKey}`;
    const body = {
      structuredQuery: {
        from: [{ collectionId: "examResults" }],
        where: {
          compositeFilter: {
            op: "AND",
            filters: [
              { fieldFilter: { field: { fieldPath: "name" }, op: "EQUAL", value: { stringValue: name } } },
              { fieldFilter: { field: { fieldPath: "examLabel" }, op: "EQUAL", value: { stringValue: EXAM_LABEL } } }
            ]
          }
        }
      }
    };
    const resp = await fetch(url, { method: "POST", headers: {"Content-Type":"application/json"}, body: JSON.stringify(body) });
    const results = await resp.json();
    // Find the best score submission
    let best = null;
    for (const item of results) {
      if (!item.document) continue;
      const f = item.document.fields;
      const pct = parseInt(f.pct?.integerValue || 0);
      if (!best || pct > best.pct) {
        best = {
          pct,
          score: parseInt(f.score?.integerValue || 0),
          total: parseInt(f.total?.integerValue || 0),
          answersData: f.answersData?.stringValue ? JSON.parse(f.answersData.stringValue) : null,
          submittedAt: f.submittedAt?.stringValue || "",
        };
      }
    }
    return best;
  } catch(e) {
    console.error("loadReviewData error:", e);
    return null;
  }
}

function renderReviewIntro() {
  return `
    <div class="intro-wrap">
      <div class="intro-card">
        <div class="intro-eyebrow" style="color:#2563eb">Review Mode</div>
        <div class="intro-title" style="font-size:32px">${EXAM_LABEL}</div>
        <div class="intro-sub">Enter your name and password to review your submitted answers</div>
        <label class="name-label">Student Name</label>
        <input class="name-input" id="nameInput" type="text" value="${REVIEW_NAME}" placeholder="Enter your full name..." autocomplete="off">
        <label class="name-label" style="margin-top:4px;">Exam Password</label>
        <input class="name-input" id="passwordInput" type="password" placeholder="Enter the exam password..." autocomplete="off">
        <div id="passwordError" style="color:#ef4444;font-size:13px;margin:-16px 0 16px;display:none;">Incorrect password. Please try again.</div>
        <div id="reviewError" style="color:#ef4444;font-size:13px;margin:-16px 0 16px;display:none;">No submission found for that name. Make sure it matches exactly.</div>
        <br>
        <button class="btn-begin active" id="beginBtn" style="background:#2563eb">Load My Results</button>
      </div>
    </div>`;
}

function renderReview() {
  const rd = reviewData;
  if (!rd) return `<div style="padding:40px;text-align:center;color:#f87171">No submission data found.</div>`;

  const lc = rd.pct >= 70 ? '#16a34a' : '#dc2626';
  const passed = rd.pct >= 70;

  // Build question review
  let qHtml = '';
  questions.forEach((q, i) => {
    const savedAns = rd.answersData ? rd.answersData[i] : null;
    const givenAns = savedAns?.given ?? null;
    const correct = scoreQuestion(q, givenAns);
    const ic = correct ? '#16a34a' : '#dc2626';
    const ibg = correct ? '#f0fdf4' : '#fef2f2';
    const ibd = correct ? '#bbf7d0' : '#fecaca';

    qHtml += `<div style="background:${ibg};border:2px solid ${ibd};border-radius:12px;padding:20px 24px;margin-bottom:16px;">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;">
        <span style="font-size:12px;color:#6b82a0;letter-spacing:2px;text-transform:uppercase;">Question ${i+1}</span>
        <span style="font-weight:700;color:${ic};font-size:14px;">${correct ? '✓ Correct' : '✗ Incorrect'} · ${q.points} pt${q.points>1?'s':''}</span>
      </div>
      <div style="font-size:16px;color:#1e3a5f;line-height:1.6;margin-bottom:16px;">${q.stem}</div>`;

    if (q.type === 'mc' || q.type === 'best2') {
      const correctIdxs = q.type === 'mc' ? [q.answer] : q.answers;
      const givenIdxs = Array.isArray(givenAns) ? givenAns : [];
      qHtml += q.options.map((opt, oi) => {
        const isCorrect = correctIdxs.includes(oi);
        const isGiven = givenIdxs.includes(oi);
        let bg = '#ffffff', border = '#bfdbfe', color = '#1e3a5f', prefix = '';
        if (isCorrect && isGiven)  { bg = '#dcfce7'; border = '#16a34a'; color = '#166534'; prefix = '✓ '; }
        else if (isCorrect)        { bg = '#dcfce7'; border = '#16a34a'; color = '#166534'; prefix = '✓ '; }
        else if (isGiven)          { bg = '#fee2e2'; border = '#dc2626'; color = '#991b1b'; prefix = '✗ '; }
        return `<div style="background:${bg};border:2px solid ${border};border-radius:8px;padding:10px 14px;margin-bottom:6px;color:${color};font-size:14px;">${prefix}${opt}</div>`;
      }).join('');
      if (givenIdxs.length === 0) qHtml += `<div style="color:#93adc8;font-size:13px;font-style:italic;">No answer selected</div>`;
    } else if (q.type === 'matching') {
      const givenPairs = Array.isArray(givenAns) ? givenAns : [];
      qHtml += q.pairs.map((pair, pi) => {
        const given = givenPairs[pi];
        const isCorrect = given === pair.def;
        return `<div style="display:flex;gap:12px;align-items:center;margin-bottom:8px;">
          <div style="flex:1;background:#e6f0fb;border-radius:6px;padding:8px 12px;font-size:13px;font-weight:700;color:#1e3a5f;">${pair.term}</div>
          <div style="flex:2;background:${isCorrect?'#dcfce7':'#fee2e2'};border:1px solid ${isCorrect?'#16a34a':'#dc2626'};border-radius:6px;padding:8px 12px;font-size:13px;color:${isCorrect?'#166534':'#991b1b'};">
            ${given || '<em style="color:#93adc8">No answer</em>'} ${isCorrect ? '✓' : `✗ (correct: ${pair.def})`}
          </div>
        </div>`;
      }).join('');
    }

    qHtml += `</div>`;
  });

  return `
    <div style="min-height:100vh;background:#f0f6ff;padding:32px 16px;font-family:Georgia,serif;">
      <div style="max-width:760px;margin:0 auto;">
        <div style="background:#fff;border-radius:16px;padding:28px 32px;margin-bottom:24px;border:2px solid ${ibd};box-shadow:0 4px 16px rgba(0,0,0,0.06);">
          <div style="font-size:12px;letter-spacing:3px;text-transform:uppercase;color:#6b82a0;margin-bottom:8px;">Exam Review · ${EXAM_LABEL}</div>
          <div style="font-size:42px;font-weight:700;color:${lc};">${rd.pct}%</div>
          <div style="font-size:16px;color:#4a6080;margin-top:4px;">${rd.score} / ${rd.total} points · ${passed ? '✓ Passed' : '✗ Did not pass'}</div>
          <div style="font-size:12px;color:#93adc8;margin-top:8px;">Submitted ${new Date(rd.submittedAt).toLocaleDateString('en-US',{month:'long',day:'numeric',year:'numeric'})}</div>
        </div>
        ${qHtml}
        <div style="text-align:center;margin-top:24px;">
          <a href="${window.location.pathname.split('?')[0]}" style="color:#6b82a0;font-size:13px;">← Back to Portal</a>
        </div>
      </div>
    </div>`;
}

// ── BOOT ─────────────────────────────────────────────
document.addEventListener("DOMContentLoaded", async ()=>{
  document.getElementById("root").innerHTML = "";
  if (REVIEW_MODE) {
    phase = "review_intro";
  }
  render();
});
</script>

<div id="root"></div>
</body>
</html>
